<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.header h1{
font-size:28px;
}

.header p{
margin-top:8px;
font-size:16px;
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.1);
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h2{
font-size:34px;
color:#1565C0;
margin-bottom:10px;
}

.section{
margin:20px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.section h3{
margin-bottom:15px;
color:#1565C0;
}

.list-item{
padding:10px;
border-bottom:1px solid #ddd;
}

.action-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.action-grid button{
padding:15px;
border:none;
border-radius:10px;
background:#1565C0;
color:white;
font-size:16px;
cursor:pointer;
}

.action-grid button:hover{
background:#0D47A1;
}

</style>

</head>

<body>

<div class="header">

<h1>🏫 School Connect TN</h1>

<p>Professional Admin Dashboard</p>

</div>

<div class="topbar">

<div id="todayDate">Loading...</div>

<div id="liveClock">00:00:00</div>

</div>
<div class="grid">

<div class="card">
<h2 id="students">0</h2>
<p>👨‍🎓 Students</p>
</div>

<div class="card">
<h2 id="teachers">0</h2>
<p>👨‍🏫 Teachers</p>
</div>

<div class="card">
<h2 id="reports">0</h2>
<p>📄 Report Cards</p>
</div>

<div class="card">
<h2 id="news">0</h2>
<p>📰 News</p>
</div>

<div class="card">
<h2 id="notice">0</h2>
<p>📢 Notices</p>
</div>

<div class="card">
<h2 id="events">0</h2>
<p>📅 Events</p>
</div>

</div>

<div class="section">

<h3>📢 Latest News</h3>

<div id="latestNews">

<div class="list-item">No News Available</div>

</div>

</div>

<div class="section">

<h3>📣 Latest Notices</h3>

<div id="latestNotice">

<div class="list-item">No Notice Available</div>

</div>

</div>

<div class="section">

<h3>⚡ Quick Actions</h3>

<div class="action-grid">

<button onclick="location.href='student_management.html'">
👨‍🎓 Students
</button>

<button onclick="location.href='teacher.html'">
👨‍🏫 Teachers
</button>

<button onclick="location.href='report_card_management.html'">
📄 Report Cards
</button>

<button onclick="location.href='gallery_management.html'">
📷 Gallery
</button>

<button onclick="location.href='calendar_management.html'">
📅 Calendar
</button>

<button onclick="location.href='dashboard_statistics.html'">
📊 Statistics
</button>

</div>

</div>

<script type="module">
  import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

// Live Date & Time
function updateClock(){

const now = new Date();

document.getElementById("todayDate").innerText =
now.toLocaleDateString("en-IN",{
day:"2-digit",
month:"long",
year:"numeric"
});

document.getElementById("liveClock").innerText =
now.toLocaleTimeString("en-IN");

}

setInterval(updateClock,1000);
updateClock();

// Dashboard Data
async function loadDashboard(){

try{

const students=await getDocs(collection(db,"students"));
document.getElementById("students").innerText=students.size;

const users=await getDocs(collection(db,"users"));

let teacherCount=0;

users.forEach((d)=>{
if(d.data().role==="Teacher"){
teacherCount++;
}
});

document.getElementById("teachers").innerText=teacherCount;

const reports=await getDocs(collection(db,"report_cards"));
document.getElementById("reports").innerText=reports.size;

const news=await getDocs(collection(db,"news"));
document.getElementById("news").innerText=news.size;

const notice=await getDocs(collection(db,"notice"));
document.getElementById("notice").innerText=notice.size;

const calendar=await getDocs(collection(db,"calendar"));
document.getElementById("events").innerText=calendar.size;

// Latest News
let newsHTML="";

news.forEach((d)=>{

const data=d.data();

newsHTML+=`
<div class="list-item">
📰 ${data.title || "Untitled News"}
</div>
`;

});

if(newsHTML===""){
newsHTML='<div class="list-item">No News Available</div>';
}

document.getElementById("latestNews").innerHTML=newsHTML;


// Latest Notice
let noticeHTML="";

notice.forEach((d)=>{

const data=d.data();

noticeHTML+=`
<div class="list-item">
📢 ${data.title || "Untitled Notice"}
</div>
`;

});

if(noticeHTML===""){
noticeHTML='<div class="list-item">No Notice Available</div>';
}

document.getElementById("latestNotice").innerHTML=noticeHTML;

}catch(error){

alert(error.message);
console.log(error);

}

}

loadDashboard();
  </script>

</body>
</html>
