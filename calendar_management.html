<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calendar Management</title>

  <link rel="stylesheet" href="css/calendar.css">
</head>

<body>

<div class="header">

    <h2>📅 School Calendar Management</h2>

</div>

<div class="container">

<div class="card">

<h3>Add New Event</h3>

<form id="eventForm">

<div class="form-group">

<label>Event Title</label>

<input
type="text"
id="title"
placeholder="Enter Event Title"
required>

</div>

<div class="form-group">

<label>Event Date</label>

<input
type="date"
id="date"
required>

</div>

<div class="form-group">

<label>Event Type</label>

<select id="type">

<option value="Holiday">Holiday</option>

<option value="Exam">Exam</option>

<option value="Meeting">Meeting</option>

<option value="Sports">Sports</option>

<option value="Annual Day">Annual Day</option>

<option value="Other">Other</option>

</select>

</div>

<div class="form-group">

<label>Description</label>

<textarea
id="description"
rows="4"
placeholder="Enter Description">
</textarea>

</div>

<button
type="submit"
class="saveBtn">

💾 Save Event

</button>

</form>

</div>

<div class="card">

<h3>School Events</h3>

<div id="eventList">
  </div>

</div>

<div class="bottomButtons">

<a href="headmaster.html" class="backBtn">

🏠 Back to Dashboard

</a>

</div>

</div>

<script type="module" src="js/calendar_management.js"></script>

</body>

</html>
