<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Report Card</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#1976D2;
color:white;
}

.print{
background:#2E7D32;
}

.back{
background:#616161;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1976D2;
color:white;
}

.summary{
font-weight:bold;
background:#E3F2FD;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

📄 Student Report Card

</div>

<div class="container">

<div class="card">

<input
id="emis"
placeholder="Enter Student EMIS Number">

<button onclick="loadReport()">

🔍 Generate Report

</button>

</div>

<div class="card">

<h3>Student Information</h3>

<p><b>Name :</b> <span id="name">-</span></p>

<p><b>Class :</b> <span id="class">-</span></p>

<p><b>Section :</b> <span id="section">-</span></p>

<table>

<thead>

<tr>

<th>Subject</th>
<th>Marks</th>

</tr>

</thead>

<tbody id="reportTable">

<tr>

<td colspan="2">

No Report Available

</td>

</tr>

</tbody>

</table>
<button class="print" onclick="window.print()">

🖨 Print Report

</button>

<button class="back" onclick="location.href='parent.html'">

🏠 Back

</button>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.loadReport = async function(){

const emis=document.getElementById("emis").value.trim();

if(emis==""){
alert("Enter EMIS Number");
return;
}

const studentSnap=await getDoc(doc(db,"students",emis));

if(!studentSnap.exists()){
alert("Student Not Found");
return;
}

const student=studentSnap.data();

document.getElementById("name").textContent=student.name;
document.getElementById("class").textContent=student.class;
document.getElementById("section").textContent=student.section;

const tbody=document.getElementById("reportTable");
tbody.innerHTML="";

const exams=[
"Unit Test",
"Quarterly",
"Half Yearly",
"Annual"
];

let found=false;

for(const exam of exams){

const markSnap=await getDoc(
doc(db,"marks",exam,"students",emis)
);

if(markSnap.exists()){

const m=markSnap.data();

found=true;

tbody.innerHTML+=`

<tr><td colspan="2"><b>${exam}</b></td></tr>

<tr><td>Tamil</td><td>${m.tamil}</td></tr>
<tr><td>English</td><td>${m.english}</td></tr>
<tr><td>Maths</td><td>${m.maths}</td></tr>
<tr><td>Science</td><td>${m.science}</td></tr>
<tr><td>Social</td><td>${m.social}</td></tr>

<tr class="summary">
<td>Total</td>
<td>${m.total}</td>
</tr>

<tr class="summary">
<td>Percentage</td>
<td>${m.percentage}%</td>
</tr>

<tr class="summary">
<td>Grade</td>
<td>${m.grade}</td>
</tr>

<tr class="summary">
<td>Result</td>

<td class="${m.result==="PASS"?"pass":"fail"}">

${m.result}

</td>

</tr>

`;

}

}

if(!found){

tbody.innerHTML=`

<tr>

<td colspan="2">

No Report Available

</td>

</tr>

`;

}

}

</script>

</body>

</html>
