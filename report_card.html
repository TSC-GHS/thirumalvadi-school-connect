<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Student Report Card</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#1976D2;
color:white;
}

.print{
background:#2E7D32;
}

.back{
background:#616161;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1976D2;
color:white;
}

.summary{
background:#E3F2FD;
font-weight:bold;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

📄 Student Report Card

</div>

<div class="container">

<div class="card">

<input
id="emis"
placeholder="Enter Student EMIS Number">

<button onclick="loadReport()">

🔍 Generate Report

</button>

</div>

<div class="card">

<h3>Student Information</h3>

<p><b>Name :</b> <span id="name">-</span></p>

<p><b>Class :</b> <span id="class">-</span></p>

<p><b>Section :</b> <span id="section">-</span></p>

<table>

<thead>

<tr>

<th>Subject</th>
<th>Marks</th>

</tr>

</thead>

<tbody id="reportTable">

<tr>

<td colspan="2">

No Report Available

</td>

</tr>

</tbody>

</table>

<div class="card">

<h3>📊 Overall Performance</h3>

<table>

<tr>

<td><b>Total Exams</b></td>

<td id="overallExams">0</td>

</tr>

<tr>

<td><b>Average Percentage</b></td>

<td id="overallPercentage">0%</td>

</tr>

<tr>

<td><b>Overall Grade</b></td>

<td id="overallGrade">-</td>

</tr>

<tr>

<td><b>Overall Result</b></td>

<td id="overallResult">-</td>

</tr>

</table>

</div>
<button class="print"
onclick="window.print()">

🖨 Print Report

</button>

<button class="back"
onclick="location.href='parent.html'">

🏠 Back

</button>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.loadReport = async function(){

const emis=document.getElementById("emis").value.trim();

if(emis===""){

alert("Enter Student EMIS Number");

return;

}

const studentSnap=await getDoc(doc(db,"students",emis));

if(!studentSnap.exists()){

alert("Student Not Found");

return;

}

const student=studentSnap.data();

document.getElementById("name").innerText=student.name;
document.getElementById("class").innerText=student.class;
document.getElementById("section").innerText=student.section;

const tbody=document.getElementById("reportTable");

tbody.innerHTML="";

const exams=[

"Unit Test",
"Quarterly",
"Half Yearly",
"Annual"

];

let examCount=0;

let totalPercentage=0;

let overallFail=false;

for(const exam of exams){

const snap=await getDoc(

doc(db,"marks",exam,"students",emis)

);

if(snap.exists()){

const m=snap.data();

examCount++;

totalPercentage+=Number(m.percentage||0);

if(m.result==="FAIL"){

overallFail=true;

}

tbody.innerHTML+=`

<tr>

<td colspan="2"
style="background:#E3F2FD;font-weight:bold;">

${exam}

</td>

</tr>

<tr>

<td>Tamil</td>

<td>${m.tamil}</td>

</tr>

<tr>

<td>English</td>

<td>${m.english}</td>

</tr>

<tr>

<td>Maths</td>

<td>${m.maths}</td>

</tr>

<tr>

<td>Science</td>

<td>${m.science}</td>

</tr>

<tr>

<td>Social</td>

<td>${m.social}</td>

</tr>

<tr class="summary">

<td>Total</td>

<td>${m.total}</td>

</tr>

<tr class="summary">

<td>Percentage</td>

<td>${m.percentage}%</td>

</tr>

<tr class="summary">

<td>Grade</td>

<td>${m.grade}</td>

</tr>

<tr class="summary">

<td>Result</td>

<td class="${m.result==="PASS"?"pass":"fail"}">

${m.result}

</td>

</tr>

`;
  }

}

if(examCount===0){

tbody.innerHTML=`

<tr>

<td colspan="2">

No Report Available

</td>

</tr>

`;

return;

}

const average=(totalPercentage/examCount).toFixed(2);

document.getElementById("overallExams").innerText=examCount;

document.getElementById("overallPercentage").innerText=average+"%";

let overallGrade="D";

if(overallFail){

overallGrade="FAIL";

}else if(average>=90){

overallGrade="A+";

}else if(average>=80){

overallGrade="A";

}else if(average>=70){

overallGrade="B+";

}else if(average>=60){

overallGrade="B";

}else if(average>=50){

overallGrade="C";

}

document.getElementById("overallGrade").innerText=overallGrade;

const overallResult=document.getElementById("overallResult");

if(overallFail){

overallResult.innerHTML="<span class='fail'>FAIL</span>";

}else{

overallResult.innerHTML="<span class='pass'>PASS</span>";

}

}

</script>

</body>

</html>
