<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Report Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3f8;
}

.header{
background:#0D47A1;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

.searchBox{
display:flex;
gap:10px;
}

.searchBox input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.searchBox button{
padding:12px 25px;
border:none;
background:#1565C0;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.schoolHeader{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.schoolHeader img{
width:80px;
height:80px;
}

.schoolTitle{
text-align:center;
}

.schoolTitle h2{
color:#0D47A1;
}

.schoolTitle h3{
margin-top:5px;
}

.studentInfo{
display:grid;
grid-template-columns:160px auto;
gap:20px;
margin-bottom:20px;
}

.studentPhoto{
text-align:center;
}

.studentPhoto img{
width:140px;
height:170px;
border:2px solid #333;
border-radius:6px;
object-fit:cover;
}

.infoTable{
width:100%;
}

.infoTable td{
padding:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#1565C0;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.summary{
background:#E3F2FD;
font-weight:bold;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

.printBtn{
margin-top:20px;
width:100%;
padding:14px;
background:#2E7D32;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.backBtn{
margin-top:10px;
width:100%;
padding:14px;
background:#616161;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.signature{
display:flex;
justify-content:space-between;
margin-top:50px;
text-align:center;
font-weight:bold;
}

@media print{

.searchCard,
.printBtn,
.backBtn{
display:none;
}

body{
background:white;
}

.card{
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="header">

📄 Student Report Card

</div>

<div class="container">

<div class="card searchCard">

<div class="searchBox">

<input
id="emis"
placeholder="Enter Student EMIS Number">

<button onclick="loadReport()">

Generate

</button>

</div>

</div>
<div class="card">

<div class="schoolHeader">

<img src="images/tn_logo.png" onerror="this.style.display='none'">

<div class="schoolTitle">

<h2>Thirumalvadi Government High School</h2>

<h3>Student Progress Report</h3>

<p>Academic Year : 2026 - 2027</p>

</div>

</div>

<div class="studentInfo">

<div class="studentPhoto">

<img
id="studentPhoto"
src="images/student.png"
onerror="this.src='https://via.placeholder.com/140x170?text=Photo'">

</div>

<div>

<table class="infoTable">

<tr>
<td><b>Student Name</b></td>
<td id="name">-</td>
</tr>

<tr>
<td><b>EMIS No</b></td>
<td id="emisNo">-</td>
</tr>

<tr>
<td><b>Class</b></td>
<td id="class">-</td>
</tr>

<tr>
<td><b>Section</b></td>
<td id="section">-</td>
</tr>

</table>

</div>

</div>

<table>

<thead>

<tr>

<th>Subject</th>
<th>Marks</th>

</tr>

</thead>

<tbody id="reportTable">

<tr>

<td colspan="2">

No Report Available

</td>

</tr>

</tbody>

</table>

<button
class="printBtn"
onclick="window.print()">

🖨 Print Report

</button>

<button
class="backBtn"
onclick="location.href='parent.html'">

🏠 Back

</button>

<div class="signature">

<div>

_________________<br>

Class Teacher

</div>

<div>

_________________<br>

Headmaster

</div>

</div>

</div>
<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.loadReport = async function () {

const emis = document.getElementById("emis").value.trim();

if(!emis){

alert("Enter EMIS Number");

return;

}

const studentSnap = await getDoc(doc(db,"students",emis));

if(!studentSnap.exists()){

alert("Student Not Found");

return;

}

const student = studentSnap.data();

document.getElementById("name").textContent = student.name;
document.getElementById("emisNo").textContent = student.emis;
document.getElementById("class").textContent = student.class;
document.getElementById("section").textContent = student.section;

if(student.photo){
document.getElementById("studentPhoto").src = student.photo;
}

const exams = [
"Unit Test",
"Quarterly",
"Half Yearly",
"Annual"
];

const tbody = document.getElementById("reportTable");

tbody.innerHTML="";

for(const exam of exams){

const snap = await getDoc(
doc(db,"marks",exam,"students",emis)
);

if(!snap.exists()) continue;

const m = snap.data();

tbody.innerHTML += `
<tr>
<td colspan="2" style="background:#f5f5f5;font-weight:bold;">
${exam}
</td>
</tr>

<tr><td>Tamil</td><td>${m.tamil}</td></tr>
<tr><td>English</td><td>${m.english}</td></tr>
<tr><td>Maths</td><td>${m.maths}</td></tr>
<tr><td>Science</td><td>${m.science}</td></tr>
<tr><td>Social</td><td>${m.social}</td></tr>

<tr class="summary">
<td>Total</td>
<td>${m.total}</td>
</tr>

<tr class="summary">
<td>Percentage</td>
<td>${m.percentage}%</td>
</tr>

<tr class="summary">
<td>Grade</td>
<td>${m.grade}</td>
</tr>

<tr class="summary">
<td>Result</td>
<td class="${m.result==="PASS"?"pass":"fail"}">
${m.result}
</td>
</tr>
`;

}

}
  </script>

</body>

</html>
