<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Report Card</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#0D47A1;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
background:#1565C0;
color:white;
}

.print{
background:#EF6C00;
}

.home{
background:#2E7D32;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1565C0;
color:white;
}

.summary{
background:#E3F2FD;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

📄 Student Report Card

</div>

<div class="container">

<div class="card">

<input
id="emis"
placeholder="Enter Student EMIS Number">

<button onclick="loadReport()">

🔍 Generate Report

</button>

</div>

<div class="card">

<h3>Student Information</h3>

<p><b>Name :</b> <span id="name">-</span></p>

<p><b>Class :</b> <span id="class">-</span></p>

<p><b>Section :</b> <span id="section">-</span></p>

<table>

<tr>

<th>Exam</th>
<th>Marks</th>

</tr>

<tbody id="reportTable">

<tr>

<td colspan="2">

No Report Available

</td>

</tr>

</tbody>

</table>

<button
class="print"
onclick="window.print()">

🖨 Print Report

</button>

</div>

<button
class="home"
onclick="location.href='parent.html'">

🏠 Back

</button>

<script type="module">
import { db } from "./firebase.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.loadReport = async function () {

  const emis = document.getElementById("emis").value.trim();

  if (emis === "") {
    alert("Enter EMIS Number");
    return;
  }

  const studentSnap = await getDoc(doc(db, "students", emis));

  if (!studentSnap.exists()) {
    alert("Student Not Found");
    return;
  }

  const student = studentSnap.data();

  document.getElementById("name").textContent = student.name;
  document.getElementById("class").textContent = student.class;
  document.getElementById("section").textContent = student.section;

  const exams = [
    "Unit Test 1",
    "Unit Test 2",
    "Quarterly",
    "Half Yearly",
    "Annual"
  ];

  const tbody = document.getElementById("reportTable");
  tbody.innerHTML = "";

  let total = 0;
  let found = 0;

  for (const exam of exams) {

    const markSnap = await getDoc(
      doc(db, "marks", exam, "students", emis)
    );

    if (markSnap.exists()) {

      const m = markSnap.data();

      const mark = Number(m.marks) || 0;

      total += mark;
      found++;

      tbody.innerHTML += `
      <tr>
        <td>${exam}</td>
        <td>${mark}</td>
      </tr>
      `;

    }

  }

  if (found === 0) {

    tbody.innerHTML = `
    <tr>
      <td colspan="2">No Report Available</td>
    </tr>
    `;

    return;

  }

  const percentage = (total / (found * 100) * 100).toFixed(1);

  let grade = "D";

  if (percentage >= 90) grade = "A+";
  else if (percentage >= 80) grade = "A";
  else if (percentage >= 70) grade = "B";
  else if (percentage >= 60) grade = "C";

  tbody.innerHTML += `
  <tr class="summary">
    <td>Total</td>
    <td>${total}</td>
  </tr>

  <tr class="summary">
    <td>Percentage</td>
    <td>${percentage}%</td>
  </tr>

  <tr class="summary">
    <td>Grade</td>
    <td>${grade}</td>
  </tr>
  `;

}
  </script>

</body>
</html>
