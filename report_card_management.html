<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Card Management</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin-top:12px;
margin-bottom:12px;
box-sizing:border-box;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
color:white;
background:#1565C0;
}

.home{
background:#2E7D32;
}

</style>

</head>

<body>

<div class="header">

📄 Report Card Management

</div>

<div class="container">

<div class="card">
<label>EMIS Number</label>
<input id="emis" placeholder="Enter EMIS Number">

<label>Student Name</label>
<input id="name" placeholder="Enter Student Name">

<label>Class</label>
<input id="class" placeholder="Enter Class">

<label>Tamil</label>
<input id="tamil" type="number" min="0" max="100" placeholder="Marks">

<label>English</label>
<input id="english" type="number" min="0" max="100" placeholder="Marks">

<label>Mathematics</label>
<input id="maths" type="number" min="0" max="100" placeholder="Marks">

<label>Science</label>
<input id="science" type="number" min="0" max="100" placeholder="Marks">

<label>Social Science</label>
<input id="social" type="number" min="0" max="100" placeholder="Marks">

<button onclick="saveReportCard()">
💾 Save Report Card
</button>

<button class="home"
onclick="location.href='dashboard.html'">
🏠 Home
</button>

</div>

</div>

<script type="module">
  import { db } from "./firebase.js";

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.saveReportCard = async function(){

const emis = document.getElementById("emis").value.trim();
const name = document.getElementById("name").value.trim();
const studentClass = document.getElementById("class").value.trim();

const tamil = Number(document.getElementById("tamil").value) || 0;
const english = Number(document.getElementById("english").value) || 0;
const maths = Number(document.getElementById("maths").value) || 0;
const science = Number(document.getElementById("science").value) || 0;
const social = Number(document.getElementById("social").value) || 0;

if(emis==="" || name==="" || studentClass===""){
    alert("Please fill all required fields");
    return;
}

const total = tamil + english + maths + science + social;
const percentage = (total / 5).toFixed(2);

let grade = "F";

if(percentage >= 90){
    grade = "A+";
}else if(percentage >= 80){
    grade = "A";
}else if(percentage >= 70){
    grade = "B";
}else if(percentage >= 60){
    grade = "C";
}else if(percentage >= 50){
    grade = "D";
}

const result = percentage >= 35 ? "PASS" : "FAIL";

try{

await setDoc(doc(db,"report_cards",emis),{

emis,
name,
class:studentClass,
tamil,
english,
maths,
science,
social,
total,
percentage:Number(percentage),
grade,
result,
updatedAt:new Date().toISOString()

});

alert("✅ Report Card Saved Successfully");

}catch(error){

alert(error.message);

}

}
  </script>

</body>
</html>
