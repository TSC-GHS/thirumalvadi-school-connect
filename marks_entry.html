<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Marks Entry</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1976D2;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

select,button{

width:100%;
padding:12px;
border-radius:8px;
font-size:16px;
box-sizing:border-box;

}

button{

background:#1976D2;
color:white;
border:none;
cursor:pointer;
margin-top:10px;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th,td{

border:1px solid #ddd;
padding:8px;
text-align:center;

}

th{

background:#1976D2;
color:white;

}

input[type=number]{

width:70px;
padding:6px;

}

</style>

</head>

<body>

<div class="header">

📝 Marks Entry

</div>

<div class="container">

<div class="card">

<div class="filters">

<select id="examType">

<option value="">Select Exam</option>

<option>Unit Test</option>

<option>Quarterly</option>

<option>Half Yearly</option>

<option>Annual</option>

</select>

<select id="classFilter">

<option value="">Class</option>

<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<select id="sectionFilter">

<option value="">Section</option>

<option>A</option>
<option>B</option>
<option>C</option>

</select>

</div>

<button onclick="loadStudents()">

📖 Load Students

</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Name</th>

<th>Tamil</th>

<th>English</th>

<th>Maths</th>

<th>Science</th>

<th>Social</th>

</tr>

</thead>

<tbody id="marksTable">

<tr>

<td colspan="6">

Select Exam & Class

</td>

</tr>

</tbody>

</table>

</div>
<button onclick="saveMarks()">
💾 Save Marks
</button>

<button onclick="location.href='report_card.html'">
📄 Report Card
</button>

<button onclick="location.href='headmaster.html'">
🏠 Back
</button>

</div>

<script type="module" src="js/marks.js"></script>

</body>
</html>
