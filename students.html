<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Students Management</title>

<link rel="stylesheet" href="css/students.css">

</head>

<body>

<!-- =====================================
HEADER
===================================== -->

<header class="header">

<div class="header-left">

<h2>👨‍🎓 Students Management</h2>

<p>School Connect TN</p>

</div>

<div class="header-right">

<button onclick="location.href='student_management.html'">

➕

</button>

</div>

</header>

<!-- =====================================
MAIN CONTAINER
===================================== -->

<div class="container">

<!-- =====================================
SUMMARY
===================================== -->

<section class="summary">

<div class="summary-box">

<h2 id="totalStudents">0</h2>

<p>Total Students</p>

</div>

<div class="summary-box">

<h2 id="boysCount">0</h2>

<p>Boys</p>

</div>

<div class="summary-box">

<h2 id="girlsCount">0</h2>

<p>Girls</p>

</div>

<div class="summary-box">

<h2 id="todayCount">0</h2>

<p>Today Added</p>

</div>

</section>

<!-- =====================================
SEARCH & FILTER
===================================== -->

<section class="card">

<input
id="search"
type="text"
placeholder="🔍 Search Student Name / EMIS"
onkeyup="searchStudent()">

<div class="filter-row">

<select id="filterClass">

<option value="">All Classes</option>

<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<select id="filterSection">

<option value="">All Sections</option>

<option>A</option>
<option>B</option>
<option>C</option>

</select>

<select id="filterMedium">

<option value="">All Medium</option>

<option>Tamil</option>
<option>English</option>

</select>

</div>

</section>

<!-- =====================================
STUDENTS LIST
===================================== -->

<div id="studentList">
<!-- =====================================
STUDENT CARD TEMPLATE
===================================== -->

<div class="student-card">

<div class="student-left">

<img
id="studentPhoto"
src="images/student.png"
alt="Student">

</div>

<div class="student-right">

<h3 id="studentName">

Loading...

</h3>

<p>

<b>Admission No :</b>

<span id="studentAdmission">

---</span>

</p>

<p>

<b>EMIS :</b>

<span id="studentEMIS">

---</span>

</p>

<p>

<b>Class :</b>

<span id="studentClass">

---</span>

-

<span id="studentSection">

A

</span>

</p>

<p>

<b>Parent :</b>

<span id="studentMobile">

---</span>

</p>

</div>

</div>

<div class="student-actions">

<button
class="view-btn">

👁 View

</button>

<button
class="edit-btn">

✏ Edit

</button>

<button
class="delete-btn">

🗑 Delete

</button>

</div>

<!-- Student cards will be loaded dynamically here -->

</div>

<!-- =====================================
BOTTOM BUTTONS
===================================== -->

<section class="card">

<div class="bottom-buttons">

<button
onclick="location.href='student_management.html'">

➕ Add Student

</button>

<button
onclick="location.href='bulk_upload.html'">

📥 Bulk Upload

</button>

<button
onclick="location.href='export_students.html'">

📤 Export

</button>

<button
onclick="location.href='admin_dashboard.html'">

🏠 Dashboard

</button>

</div>

</section>
<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const studentList = document.getElementById("studentList");
const totalStudents = document.getElementById("totalStudents");
const boysCount = document.getElementById("boysCount");
const girlsCount = document.getElementById("girlsCount");
const todayCount = document.getElementById("todayCount");

let allStudents = [];

async function loadStudents(){

studentList.innerHTML="";

const snap = await getDocs(collection(db,"students"));

allStudents=[];

let boys=0;
let girls=0;
let today=0;

const todayDate=new Date().toISOString().substring(0,10);

snap.forEach(studentDoc=>{

const student=studentDoc.data();

student.id=studentDoc.id;

allStudents.push(student);

if(student.gender==="Male") boys++;
if(student.gender==="Female") girls++;

if(student.createdAt &&
student.createdAt.substring(0,10)===todayDate){
today++;
}

});

renderStudents(allStudents);

totalStudents.innerText=allStudents.length;
boysCount.innerText=boys;
girlsCount.innerText=girls;
todayCount.innerText=today;

}

function renderStudents(list){

studentList.innerHTML="";

list.forEach(student=>{

const emis=student.emis || student.id;

studentList.innerHTML+=`

<div class="student-card">

<div class="student-left">

<img src="images/student.png">

</div>

<div class="student-right">

<h3>${student.name || "-"}</h3>

<p><b>Admission :</b> ${student.admissionNo || "-"}</p>

<p><b>EMIS :</b> ${emis}</p>

<p><b>Class :</b> ${student.class || "-"} - ${student.section || "-"}</p>

<p><b>Mobile :</b> ${student.mobile || "-"}</p>

</div>

</div>

<div class="student-actions">

<button class="view-btn"
onclick="location.href='student_profile_v2.html?emis=${emis}'">

👁 View

</button>

<button class="edit-btn"
onclick="location.href='student_management.html?emis=${emis}'">

✏ Edit

</button>

<button class="delete-btn"
onclick="deleteStudent('${student.id}')">

🗑 Delete

</button>

</div>

`;

});

}

window.deleteStudent=async function(id){

if(confirm("Delete this student?")){

await deleteDoc(doc(db,"students",id));

loadStudents();

}

}

window.searchStudent=function(){

const value=document
.getElementById("search")
.value
.toLowerCase();

const classFilter=document.getElementById("filterClass").value;
const sectionFilter=document.getElementById("filterSection").value;
const mediumFilter=document.getElementById("filterMedium").value;

const filtered=allStudents.filter(student=>{

const searchMatch=
(student.name || "").toLowerCase().includes(value) ||
(student.emis || "").toLowerCase().includes(value);

const classMatch=
!classFilter || student.class==classFilter;

const sectionMatch=
!sectionFilter || student.section==sectionFilter;

const mediumMatch=
!mediumFilter || student.medium==mediumFilter;

return searchMatch &&
classMatch &&
sectionMatch &&
mediumMatch;

});

renderStudents(filtered);

};

document.getElementById("filterClass").onchange=searchStudent;
document.getElementById("filterSection").onchange=searchStudent;
document.getElementById("filterMedium").onchange=searchStudent;

loadStudents();

</script>
