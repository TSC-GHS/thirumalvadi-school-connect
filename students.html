<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students List</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.card h3{
margin:0;
color:#1565C0;
}

.card p{
margin:6px 0;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.actions button{
flex:1;
min-width:90px;
padding:10px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
}

.profile{
background:#1976D2;
}

.edit{
background:#FB8C00;
}

.delete{
background:#D32F2F;
}

.home{
width:100%;
margin-top:20px;
padding:15px;
background:#2E7D32;
font-size:18px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

👨‍🎓 Students List

</div>

<div class="container">

<input
id="search"
placeholder="Search by Name or EMIS"
onkeyup="searchStudent()">

<div id="studentList"></div>
<button
class="home"
onclick="location.href='student_management.html'">

➕ Add Student

</button>

<button
class="home"
onclick="location.href='admin_dashboard_v2.html'">

🏠 Admin Dashboard

</button>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const studentList = document.getElementById("studentList");

async function loadStudents(){

studentList.innerHTML="";

try{

const snap = await getDocs(collection(db,"students"));

snap.forEach((studentDoc)=>{

const student = studentDoc.data();
const emis = studentDoc.id;
 studentList.innerHTML += `

<div class="card">

<h3>${student.name || "-"}</h3>

<p><b>EMIS :</b> ${emis}</p>

<p><b>Class :</b> ${student.class || "-"} - ${student.section || "-"}</p>

<p><b>Father :</b> ${student.father || "-"}</p>

<p><b>Mobile :</b> ${student.mobile || "-"}</p>

<p><b>Blood Group :</b> ${student.blood || "-"}</p>

<div class="actions">

<button
class="profile"
onclick="location.href='student_profile_v2.html?emis=${emis}'">

👁 Profile

</button>

<button
class="edit"
onclick="location.href='student_management.html?emis=${emis}'">

✏ Edit

</button>

<button
class="delete"
onclick="deleteStudent('${emis}')">

🗑 Delete

</button>

</div>

</div>

`;

});
 }catch(error){

alert(error.message);
console.log(error);

}

}

window.deleteStudent = async function(emis){

if(confirm("Delete this student?")){

try{

await deleteDoc(doc(db,"students",emis));

alert("✅ Student Deleted Successfully");

loadStudents();

}catch(error){

alert(error.message);

}

}

}

window.searchStudent = function(){

const value =
document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display =
card.innerText.toLowerCase().includes(value)
? "block"
: "none";

});

}

loadStudents();

</script>

</div>

</body>
</html>
