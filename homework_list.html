<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Homework List</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#6A1B9A;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
background:#6A1B9A;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#6A1B9A;
color:white;
}

</style>

</head>

<body>

<div class="header">

📚 Homework List

</div>

<div class="container">

<div class="card">

<div class="grid">

<select id="classFilter">

<option value="">All Classes</option>

<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<select id="sectionFilter">

<option value="">All Sections</option>

<option>A</option>
<option>B</option>
<option>C</option>

</select>

</div>

<button onclick="loadHomework()">

📖 Load Homework

</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Class</th>
<th>Section</th>
<th>Due Date</th>
<th>Homework</th>

</tr>

</thead>

<tbody id="homeworkTable">

<tr>

<td colspan="4">

No Homework Found

</td>

</tr>

</tbody>

</table>

</div>
<button onclick="location.href='homework_management.html'">

➕ Add Homework

</button>

<button onclick="location.href='teacher.html'">

🏠 Back

</button>

</div>

<script type="module" src="js/homework_list.js"></script>

</body>

</html>
