<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#2E7D32;
color:white;
padding:20px;
text-align:center;
}

.header h1{
font-size:28px;
}

.header p{
margin-top:5px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h2{
font-size:34px;
color:#2E7D32;
margin-bottom:10px;
}

.section{
margin:20px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.section h3{
margin-bottom:15px;
color:#2E7D32;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2E7D32;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#1565C0;
color:white;
cursor:pointer;
margin:8px;
font-size:16px;
}

.actions{
text-align:center;
margin:20px;
}

</style>

</head>

<body>

<div class="header">

<h1>📅 Attendance Dashboard</h1>

<p>School Connect TN</p>

</div>
<div class="cards">

<div class="card">
<h2 id="totalStudents">0</h2>
<p>👨‍🎓 Total Students</p>
</div>

<div class="card">
<h2 id="presentStudents">0</h2>
<p>✅ Present</p>
</div>

<div class="card">
<h2 id="absentStudents">0</h2>
<p>❌ Absent</p>
</div>

<div class="card">
<h2 id="attendancePercent">0%</h2>
<p>📈 Attendance %</p>
</div>

</div>

<div class="section">

<h3>📋 Today's Attendance</h3>

<table>

<thead>

<tr>

<th>Name</th>
<th>EMIS</th>
<th>Class</th>
<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

<tr>

<td colspan="4" style="text-align:center;">
Loading...
</td>

</tr>

</tbody>

</table>

</div>

<div class="actions">

<button onclick="location.href='attendance.html'">
➕ Mark Attendance
</button>

<button onclick="location.href='attendance_history.html'">
📄 Attendance History
</button>

<button onclick="location.href='admin_dashboard_v2.html'">
🏠 Admin Dashboard
</button>

</div>

<script type="module">
  import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

async function loadAttendanceDashboard(){

try{

const studentSnapshot = await getDocs(collection(db,"students"));
const attendanceSnapshot = await getDocs(collection(db,"attendance"));

let totalStudents = studentSnapshot.size;
let present = 0;
let absent = 0;

let tableHTML = "";

attendanceSnapshot.forEach((doc)=>{

const data = doc.data();

if(data.status === "Present"){
present++;
}else{
absent++;
}

tableHTML += `
<tr>
<td>${data.name || ""}</td>
<td>${data.emis || ""}</td>
<td>${data.class || ""}</td>
<td>${data.status || ""}</td>
</tr>
`;

});

document.getElementById("totalStudents").innerText = totalStudents;
document.getElementById("presentStudents").innerText = present;
document.getElementById("absentStudents").innerText = absent;

let percent = 0;

if(totalStudents > 0){
percent = ((present / totalStudents) * 100).toFixed(1);
}

document.getElementById("attendancePercent").innerText =
percent + "%";

if(tableHTML === ""){
tableHTML = `
<tr>
<td colspan="4" style="text-align:center;">
No Attendance Available
</td>
</tr>`;
}

document.getElementById("attendanceTable").innerHTML = tableHTML;

}catch(error){

alert(error.message);
console.log(error);

}

}

loadAttendanceDashboard();
  </script>

</body>
</html>
