<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Attendance Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#2E7D32;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

input,select{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;

}

button{

width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2E7D32;
color:white;
font-size:17px;
cursor:pointer;

}

button:hover{

background:#1B5E20;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

border:1px solid #ddd;
padding:10px;
text-align:center;

}

th{

background:#2E7D32;
color:white;

}

.status{

font-weight:bold;

}

.present{

color:green;

}

.absent{

color:red;

}

.leave{

color:orange;

}

</style>

</head>

<body>

<div class="header">

📅 Attendance Management

</div>

<div class="container">

<div class="card">

<div class="filters">

<input
type="date"
id="attendanceDate">

<select id="classFilter">

<option value="">Select Class</option>

<option>6</option>

<option>7</option>

<option>8</option>

<option>9</option>

<option>10</option>

</select>

<select id="sectionFilter">

<option value="">Section</option>

<option>A</option>

<option>B</option>

<option>C</option>

</select>

</div>

<button onclick="loadStudents()">

🔍 Load Students

</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Name</th>

<th>EMIS</th>

<th>Attendance</th>

</tr>

</thead>

<tbody id="studentTable">

<tr>

<td colspan="3">

Select Class & Date

</td>

</tr>

</tbody>

</table>

</div>

<button onclick="saveAttendance()">

💾 Save Attendance

</button>
<button onclick="location.href='attendance_history.html'">

📊 Attendance History

</button>

<button onclick="location.href='headmaster.html'">

🏠 Back

</button>

<script type="module" src="js/attendance.js"></script>

</body>

</html>
