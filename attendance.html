<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#2E7D32;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2E7D32;
color:white;
}

select{
padding:8px;
border-radius:6px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:8px;
background:#2E7D32;
color:white;
font-size:17px;
cursor:pointer;
}

.home{
background:#1565C0;
}

</style>

</head>

<body>

<div class="header">

📅 Attendance Management

</div>

<div class="container">

<div class="card">

<table>

<thead>

<tr>

<th>Name</th>

<th>Class</th>

<th>Attendance</th>

</tr>

</thead>

<tbody id="studentTable">

<tr>

<td colspan="3">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<button onclick="saveAttendance()">

💾 Save Attendance

</button>

<button
class="home"
onclick="location.href='headmaster.html'">

🏠 Back

</button>

<script type="module">
  import { db } from "./firebase.js";

import {
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const studentTable = document.getElementById("studentTable");

let students = [];

async function loadStudents(){

studentTable.innerHTML = "";

students = [];

const snap = await getDocs(collection(db,"students"));

snap.forEach((d)=>{

const student = d.data();

students.push(student);

studentTable.innerHTML += `

<tr>

<td>${student.name}</td>

<td>${student.class}-${student.section}</td>

<td>

<select id="${student.emis}">

<option value="100%">Present</option>

<option value="0%">Absent</option>

<option value="Leave">Leave</option>

</select>

</td>

</tr>

`;

});

}

window.saveAttendance = async function(){

for(const student of students){

const attendance = document.getElementById(student.emis).value;

await updateDoc(

doc(db,"students",student.emis),

{

attendance: attendance

}

);

}

alert("Attendance Saved Successfully ✅");

}

loadStudents();
  </script>

</body>
</html>
