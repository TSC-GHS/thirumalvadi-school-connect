<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

select,input{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1565C0;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
color:white;
}

.save{
background:#2E7D32;
}

.back{
background:#1565C0;
}

</style>

</head>

<body>

<div class="header">
📅 Attendance Management
</div>

<div class="container">

<div class="card">

<label>Date</label>
<input type="date" id="attendanceDate">

<label>Class</label>
<select id="className">
<option value="">Select Class</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Section</label>
<select id="section">
<option value="">Select Section</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<button class="save" id="loadStudents">
📋 Load Students
</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>EMIS</th>

<th>Name</th>

<th>Status</th>

</tr>

</thead>

<tbody id="studentList">

<tr>

<td colspan="3">

Click "Load Students"

</td>

</tr>

</tbody>

</table>

<button class="save" id="saveAttendance">

💾 Save Attendance

</button>

<button class="back"
onclick="location.href='teacher.html'">

🏠 Back to Teacher Dashboard

</button>

</div>

</div>

<script type="module" src="js/attendance.js"></script>

</body>
</html>
