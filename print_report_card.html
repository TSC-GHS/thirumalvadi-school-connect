<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Print Report Card</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

.report{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

h1,h2,h3{
text-align:center;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid #444;
}

th,td{
padding:10px;
text-align:center;
}

.info{
margin-top:20px;
line-height:2;
}

button{
width:100%;
padding:15px;
margin-top:20px;
font-size:18px;
border:none;
border-radius:8px;
background:#1565C0;
color:white;
cursor:pointer;
}

@media print{

button{
display:none;
}

body{
background:white;
}

.report{
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="report">

<h1>🏫 Thirumalvadi Government High School</h1>

<h2>School Connect TN</h2>

<h3>Student Report Card</h3>
<div class="info">

<p><b>Student Name :</b> <span id="name"></span></p>

<p><b>EMIS Number :</b> <span id="emis"></span></p>

<p><b>Class :</b> <span id="class"></span></p>

</div>

<table>

<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

<tr>
<td>Tamil</td>
<td id="tamil"></td>
</tr>

<tr>
<td>English</td>
<td id="english"></td>
</tr>

<tr>
<td>Mathematics</td>
<td id="maths"></td>
</tr>

<tr>
<td>Science</td>
<td id="science"></td>
</tr>

<tr>
<td>Social Science</td>
<td id="social"></td>
</tr>

<tr>
<th>Total</th>
<th id="total"></th>
</tr>

<tr>
<th>Percentage</th>
<th id="percentage"></th>
</tr>

<tr>
<th>Grade</th>
<th id="grade"></th>
</tr>

<tr>
<th>Result</th>
<th id="result"></th>
</tr>

</table>

<button onclick="window.print()">

🖨️ Print Report Card

</button>

</div>

<script type="module">
  import { db } from "./firebase.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const emis = params.get("emis");

async function loadReportCard() {

  if (!emis) {
    alert("EMIS Number not found");
    return;
  }

  try {

    const reportRef = doc(db, "report_cards", emis);
    const reportSnap = await getDoc(reportRef);

    if (!reportSnap.exists()) {
      alert("Report Card Not Found");
      return;
    }

    const data = reportSnap.data();

    document.getElementById("emis").innerText = emis;
    document.getElementById("name").innerText = data.name || "";
    document.getElementById("class").innerText = data.class || "";

    document.getElementById("tamil").innerText = data.tamil || 0;
    document.getElementById("english").innerText = data.english || 0;
    document.getElementById("maths").innerText = data.maths || 0;
    document.getElementById("science").innerText = data.science || 0;
    document.getElementById("social").innerText = data.social || 0;

    document.getElementById("total").innerText = data.total || 0;
    document.getElementById("percentage").innerText = (data.percentage || 0) + "%";
    document.getElementById("grade").innerText = data.grade || "-";
    document.getElementById("result").innerText = data.result || "-";

  } catch (error) {

    alert(error.message);

  }

}

loadReportCard();
  </script>

</body>
</html>
