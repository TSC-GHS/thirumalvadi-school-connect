<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Connect TN - Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

header{
    background:#1565C0;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

button{
    padding:18px;
    border:none;
    border-radius:10px;
    background:#1565C0;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#0D47A1;
}

.logout{
    background:#d32f2f;
}

.logout:hover{
    background:#b71c1c;
}
</style>

</head>

<body>

<header>

<h1>🏫 School Connect TN</h1>

<p>Thirumalvadi Government High School</p>

</header>

<div class="container">

<div class="card">

<h2>Welcome 👋</h2>

<p>Select your module below.</p>

</div>

<div class="grid">

<button onclick="location.href='teacher.html'">
👨‍🏫 Teacher
</button>

<button onclick="location.href='student.html'">
👨‍🎓 Student
</button>

<button onclick="location.href='parent.html'">
👨‍👩‍👧 Parent
</button>

<button onclick="location.href='headmaster.html'">
👨‍💼 Headmaster
</button>

<button onclick="alert('Attendance Module - Coming Soon')">
📅 Attendance
</button>

<button onclick="alert('Homework Module - Coming Soon')">
📝 Homework
</button>

<button onclick="alert('Marks Module - Coming Soon')">
📊 Marks
</button>

<button onclick="alert('Notice Board - Coming Soon')">
📢 Notice Board
</button>

<button class="logout" onclick="location.href='login.html'">
🚪 Logout
</button>

</div>

</div>

</body>
</html>
