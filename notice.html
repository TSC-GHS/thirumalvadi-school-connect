<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Notice Board</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#d32f2f;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.notice{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.notice h3{
margin:0;
color:#1565C0;
}

.notice p{
margin:8px 0;
}

.date{
color:#D32F2F;
font-size:14px;
font-weight:bold;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#2E7D32;
color:white;
font-size:17px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

📢 School Notice Board

</div>

<div class="container">

<div id="noticeList">

Loading Notices...

</div>
</div>

<button onclick="location.href='dashboard.html'">

🏠 Home

</button>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const noticeList = document.getElementById("noticeList");

async function loadNotices(){

noticeList.innerHTML = "Loading Notices...";

try{

const q = query(collection(db,"notice"),orderBy("date","desc"));

const snap = await getDocs(q);

noticeList.innerHTML = "";

if(snap.empty){

noticeList.innerHTML = `
<div class="notice">
<h3>No Notices Available</h3>
<p>Please check again later.</p>
</div>`;
return;

}

snap.forEach(doc=>{

const data = doc.data();

noticeList.innerHTML += `

<div class="notice">

<h3>${data.title || "-"}</h3>

<p>${data.description || "-"}</p>

<div class="date">

📅 ${data.date || "-"}

</div>

</div>

`;

});

}catch(error){

console.log(error);

noticeList.innerHTML = `
<div class="notice">
<h3>Error</h3>
<p>${error.message}</p>
</div>`;

}

}

loadNotices();

</script>

</body>

</html>
