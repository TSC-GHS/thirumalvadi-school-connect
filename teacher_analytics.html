<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Analytics</title>

<link rel="stylesheet" href="css/teacher_analytics.css">

</head>

<body>

<div class="header">

<h2>👨‍🏫 Teacher Analytics</h2>

<p>School Connect TN</p>

</div>

<div class="container">

<!-- Summary -->

<div class="summaryGrid">

<div class="card blue">

<h3 id="totalTeachers">0</h3>

<p>Total Teachers</p>

</div>

<div class="card green">

<h3 id="activeTeachers">0</h3>

<p>Active Teachers</p>

</div>

<div class="card orange">

<h3 id="classTeachers">0</h3>

<p>Class Teachers</p>

</div>

<div class="card pink">

<h3 id="totalSubjects">0</h3>

<p>Subjects</p>

</div>

</div>

<!-- Teacher List -->

<div class="listCard">

<h3>👨‍🏫 Teacher List</h3>

<div id="teacherList">

<p style="text-align:center;">
Loading...
</p>

</div>

</div>

<button
class="backBtn"
onclick="location.href='headmaster.html'">

🏠 Back to Dashboard

</button>

</div>

<script type="module"
src="js/teacher_analytics.js"></script>

</body>

</html>
