<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Attendance History</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#2E7D32;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

input{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;

}

button{

width:100%;
padding:14px;
background:#2E7D32;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:10px;

}

.summary{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;

}

.box{

background:#E8F5E9;
padding:15px;
border-radius:10px;
text-align:center;

}

.box h2{

margin:0;
color:#2E7D32;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th,td{

border:1px solid #ddd;
padding:10px;
text-align:center;

}

th{

background:#2E7D32;
color:white;

}

</style>

</head>

<body>

<div class="header">

📅 Attendance History

</div>

<div class="container">

<div class="card">

<div class="filters">

<input
id="emis"
placeholder="Enter EMIS Number">

<input
type="date"
id="fromDate">

<input
type="date"
id="toDate">

</div>

<button onclick="loadAttendanceHistory()">

🔍 Load Attendance

</button>

</div>

<div class="summary">

<div class="box">

<h2 id="workingDays">0</h2>

Working Days

</div>

<div class="box">

<h2 id="presentDays">0</h2>

Present

</div>

<div class="box">

<h2 id="absentDays">0</h2>

Absent

</div>

<div class="box">

<h2 id="leaveDays">0</h2>

Leave

</div>

<div class="box">

<h2 id="percentage">0%</h2>

Attendance %

</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="2">

Search Attendance

</td>

</tr>

</tbody>

</table>

</div>
<button onclick="location.href='attendance.html'">
📅 Attendance Management
</button>

<button onclick="location.href='headmaster.html'">
🏠 Back
</button>

<script type="module" src="js/attendance_history.js"></script>

</div>

</body>
</html>
