<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Attendance History</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#2E7D32;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#2E7D32;
color:white;
font-size:17px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2E7D32;
color:white;
}

.summary{
background:#E8F5E9;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

📅 Attendance History

</div>

<div class="container">

<div class="card">

<div class="filters">

<input
id="emis"
placeholder="Enter Student EMIS Number">

<input
type="date"
id="historyDate">

</div>

<button onclick="loadAttendanceHistory()">

🔍 Load Attendance

</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="2">

No Attendance Records

</td>

</tr>

</tbody>

</table>

</div>
<button onclick="location.href='attendance.html'">
📅 Attendance Management
</button>

<button onclick="location.href='headmaster.html'">
🏠 Back
</button>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.loadAttendanceHistory = async function(){

const emis = document.getElementById("emis").value.trim();

const historyDate = document.getElementById("historyDate").value;

if(emis==""){

alert("Enter Student EMIS Number");

return;

}

const table=document.getElementById("historyTable");

table.innerHTML="";

let present=0;
let absent=0;
let leave=0;

if(historyDate!=""){

const snap=await getDocs(
collection(db,"attendance",historyDate,"students")
);

snap.forEach((d)=>{

const data=d.data();

if(data.emis===emis){

table.innerHTML+=`

<tr>

<td>${data.date}</td>

<td>${data.status}</td>

</tr>

`;

if(data.status==="Present") present++;

if(data.status==="Absent") absent++;

if(data.status==="Leave") leave++;

}

});

}else{

table.innerHTML=`

<tr>

<td colspan="2">

Please Select Date

</td>

</tr>

`;

return;

}

if(table.innerHTML===""){

table.innerHTML=`

<tr>

<td colspan="2">

No Attendance Found

</td>

</tr>

`;

return;

}

table.innerHTML+=`

<tr class="summary">

<td>Total Present</td>

<td>${present}</td>

</tr>

<tr class="summary">

<td>Total Absent</td>

<td>${absent}</td>

</tr>

<tr class="summary">

<td>Total Leave</td>

<td>${leave}</td>

</tr>

`;

}

</script>

</body>

</html>
