<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Teacher Management</title>

<link rel="stylesheet"
href="css/manage_teachers.css">

</head>

<body>

<div class="header">

<div>

<h2>

👨‍🏫 Teacher Management

</h2>

<p>

School Connect TN

</p>

</div>

<button
class="backBtn"
onclick="location.href='headmaster.html'">

🏠 Dashboard

</button>

</div>

<div class="container">

<div class="card">

<h3>

Teacher Information

</h3>

<input
type="text"
id="teacherName"
placeholder="Teacher Name">

<input
type="text"
id="teacherId"
placeholder="Teacher ID">

<input
type="tel"
id="teacherMobile"
placeholder="Mobile Number">

<input
type="email"
id="teacherEmail"
placeholder="Email Address">

<select
id="teacherType">

<option value="">

Select Teacher Type

</option>

<option value="Class Teacher">

Class Teacher

</option>

<option value="Subject Teacher">

Subject Teacher

</option>

</select>

<input
type="text"
id="teacherSubject"
placeholder="Subject">

<select
id="teacherClass">

<option value="">

Select Class

</option>

<option>6</option>

<option>7</option>

<option>8</option>

<option>9</option>

<option>10</option>

</select>

<select
id="teacherSection">

<option value="">

Select Section

</option>

<option>A</option>

<option>B</option>

<option>C</option>

</select>

<select
id="teacherStatus">

<option value="Active">

Active

</option>

<option value="Inactive">

Inactive

</option>

</select>

<input
type="text"
id="assignedClasses"
placeholder="Assigned Classes (Eg: 9-B,10-A)">
<div class="buttonGroup">

<button
id="saveTeacherBtn"
class="saveBtn">

💾 Save Teacher

</button>

<button
id="updateTeacherBtn"
class="updateBtn">

✏️ Update Teacher

</button>

</div>

</div>

<div class="card">

<h3>

Teacher Directory

</h3>

<input
type="text"
id="searchTeacher"
placeholder="🔍 Search by Name / ID">

<div id="teacherList">

Loading Teachers...

</div>

</div>

</div>

<script
type="module"
src="js/manage_teachers.js">

</script>

</body>

</html>
