<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notice Management</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:700px;
margin:20px auto;
padding:15px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,
textarea,
select{

width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;

}

textarea{

height:120px;
resize:none;

}

button{

width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
color:#fff;

}

.save{

background:#2E7D32;

}

.dashboard{

background:#1565C0;

}

.notice{

border-left:5px solid #1565C0;
margin-top:15px;

}

.notice h3{

margin:0;
color:#1565C0;

}

.notice small{

color:#666;

}

.delete{

background:#D32F2F;
margin-top:10px;

}

</style>

</head>

<body>

<div class="header">

📢 Notice Management

</div>

<div class="container">

<div class="card">

<label>Notice Title</label>

<input
type="text"
id="title"
placeholder="Enter Notice Title">

<label>Description</label>

<textarea
id="description"
placeholder="Enter Notice Details"></textarea>

<label>Priority</label>

<select id="priority">

<option value="Normal">
Normal
</option>

<option value="Important">
Important
</option>

</select>

<button
class="save"
onclick="saveNotice()">

💾 Publish Notice

</button>

<button
class="dashboard"
onclick="location.href='teacher.html'">

🏠 Back to Teacher Dashboard

</button>

</div>

<div id="noticeList">

</div>

</div>

<script type="module" src="js/notice_management.js"></script>

</body>

</html>
