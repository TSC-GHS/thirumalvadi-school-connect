<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Notice Management</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#E65100;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

input,select,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

textarea{
height:140px;
resize:vertical;
}

button{
width:100%;
padding:14px;
background:#E65100;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

📢 Notice Management

</div>

<div class="container">

<div class="card">

<input
type="text"
id="noticeTitle"
placeholder="Notice Title">

<textarea
id="noticeMessage"
placeholder="Enter Notice">
</textarea>

<select id="priority">

<option value="">Select Priority</option>
<option>Normal</option>
<option>Important</option>
<option>Urgent</option>

</select>
<input
type="date"
id="publishDate">

<button onclick="saveNotice()">

💾 Save Notice

</button>

<button onclick="location.href='notice_list.html'">

📋 Notice List

</button>

<button onclick="location.href='headmaster.html'">

🏠 Back

</button>

</div>

</div>

<script type="module" src="js/notice_management.js"></script>

</body>

</html>
