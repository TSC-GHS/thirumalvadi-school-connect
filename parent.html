<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#6A1B9A;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

h2{
margin-top:0;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
background:#6A1B9A;
color:white;
cursor:pointer;
}

.home{
background:#2E7D32;
}

.logout{
background:#D32F2F;
}

.leave{
background:#1565C0;
}

</style>

</head>

<body>

<div class="header">

👨‍👩‍👧 Parent Dashboard

</div>

<div class="container">

<div class="card">

<h2>Welcome Parent 👋</h2>

<button onclick="location.href='parent_dashboard.html'">
👨‍🎓 My Child
</button>

<button onclick="location.href='notice_board.html'">
📢 Notice Board
</button>

<button onclick="location.href='parent_dashboard.html'">
📅 Child Attendance
</button>

<button onclick="location.href='parent_dashboard.html'">
📚 Child Marks
</button>

<button onclick="location.href='parent_dashboard.html'">
📝 Homework
</button>

<button class="leave" onclick="openLeaveRequest()">
📝 Leave Request
</button>

<button class="leave" onclick="openLeaveStatus()">
📋 Leave Status
</button>

<button class="home" onclick="location.href='dashboard.html'">
🏠 Home
</button>

<button class="logout" onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<script>

function getEmis(){

return sessionStorage.getItem("emis")
||localStorage.getItem("emis");

}

function openLeaveRequest(){

const emis=getEmis();

if(!emis){

alert("EMIS Number Missing");

return;

}

location.href="leave_request.html?emis="+emis;

}

function openLeaveStatus(){

const emis=getEmis();

if(!emis){

alert("EMIS Number Missing");

return;

}

location.href="leave_status.html?emis="+emis;

}

function logout(){

sessionStorage.clear();

location.href="index.html";

}

</script>

</body>
</html>
