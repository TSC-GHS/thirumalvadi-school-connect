<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

h2{
margin-top:0;
color:#1565C0;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
background:#1565C0;
color:white;
transition:0.3s;
}

button:hover{
opacity:.9;
}

.leave{
background:#FB8C00;
}

.home{
background:#2E7D32;
}

.logout{
background:#D32F2F;
}

</style>

</head>

<body>

<div class="header">

👨‍👩‍👧 Parent Dashboard

</div>

<div class="container">

<div class="card">

<h2>Welcome Parent 👋</h2>

<button onclick="location.href='parent_dashboard.html'">

👨‍🎓 My Child

</button>

<button onclick="location.href='notice_board.html'">

📢 Notice Board

</button>

<button onclick="location.href='parent_dashboard.html'">

📅 Child Attendance

</button>

<button onclick="location.href='parent_dashboard.html'">

📚 Child Marks

</button>

<button onclick="location.href='parent_dashboard.html'">

📝 Homework

</button>

<button class="leave"
onclick="location.href='leave_request.html?emis='+localStorage.getItem('parentEMIS')">

📝 Apply Leave

</button>

<button class="leave"
onclick="location.href='leave_status.html?emis='+localStorage.getItem('parentEMIS')">

📋 Leave Status

</button>

<button class="home"
onclick="location.href='dashboard.html'">

🏠 Home

</button>

<button class="logout"
onclick="location.href='index.html'">

🚪 Logout

</button>

</div>

</div>

</body>
</html>
