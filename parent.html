<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Parent Dashboard</title>

<link rel="stylesheet"
href="css/parent.css">

</head>

<body>

<!-- =====================================
HEADER
===================================== -->

<header class="header">

<div class="headerLeft">

<h2>🏫 School Connect TN</h2>

<p>Parent Dashboard</p>

</div>

</header>

<!-- =====================================
MAIN CONTAINER
===================================== -->

<div class="container">

<!-- =====================================
WELCOME CARD
===================================== -->

<section class="card">

<h2>👋 Welcome Parent</h2>

<div class="profile">

<img
src="images/student.png"
id="studentPhoto"
alt="Student">

<div class="info">

<p>

<b>Student Name</b>

<br>

<span id="studentName">

Loading...

</span>

</p>

<p>

<b>EMIS Number</b>

<br>

<span id="studentEMIS">

Loading...

</span>

</p>

<p>

<b>Class</b>

<br>

<span id="studentClass">

Loading...

</span>

</p>

</div>

</div>

</section>

<!-- =====================================
SUMMARY
===================================== -->

<section class="summary">

<div class="summary-box">

<h1 id="attendanceCount">

0%

</h1>

<p>Attendance</p>

</div>

<div class="summary-box">

<h1 id="resultCount">

0%

</h1>

<p>Average</p>

</div>

<div class="summary-box">

<h1 id="homeworkCount">

0

</h1>

<p>Homework</p>

</div>

<div class="summary-box">

<h1 id="noticeCount">

0

</h1>

<p>Notices</p>

</div>

</section>

<!-- =====================================
QUICK ACTIONS
===================================== -->

<section class="card">

<h2>

⚡ Quick Actions

</h2>

<div class="quickmenu">

<button
onclick="location.href='parent_dashboard.html'">

👨‍🎓

<br>

My Child

</button>

<button
onclick="location.href='notice_board.html'">

📢

<br>

Notice

</button>

<button
onclick="location.href='parent_dashboard.html'">

📅

<br>

Attendance

</button>

<button
onclick="location.href='parent_dashboard.html'">

📚

<br>

Marks

</button>

<button
onclick="location.href='parent_dashboard.html'">

📝

<br>

Homework

</button>

<button
onclick="location.href='parent_report_card.html?emis='+localStorage.getItem('parentEMIS')">

📄

<br>

Report Card

</button>

<button
onclick="location.href='leave_request.html?emis='+localStorage.getItem('parentEMIS')">

📝

<br>

Apply Leave

</button>

<button
onclick="location.href='leave_status.html?emis='+localStorage.getItem('parentEMIS')">

📋

<br>

Leave Status

</button>

</div>

</section>
<!-- =====================================
LATEST NOTICES
===================================== -->

<section class="card">

<h2>📢 Latest Notices</h2>

<div class="notice-list" id="latestNotices">

<div class="notice-item">

<div class="notice-title">

Loading Notices...

</div>

</div>

</div>

</section>

<!-- =====================================
RECENT HOMEWORK
===================================== -->

<section class="card">

<h2>📚 Recent Homework</h2>

<div class="homework-list" id="recentHomework">

<div class="homework-item">

<div class="homework-sub">

Loading Homework...

</div>

</div>

</div>

</section>

</div>

<!-- =====================================
BOTTOM NAVIGATION
===================================== -->

<div class="bottom-nav">

<button
onclick="location.href='parent_dashboard.html'">

<span>🏠</span>

Home

</button>

<button
onclick="location.href='notice_board.html'">

<span>📢</span>

Notice

</button>

<button
onclick="location.href='parent_report_card.html?emis='+localStorage.getItem('parentEMIS')">

<span>📄</span>

Report

</button>

<button
onclick="location.href='index.html'">

<span>🚪</span>

Logout

</button>

</div>

</body>

</html>
