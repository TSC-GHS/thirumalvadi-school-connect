<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Parent Attendance</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3f9;
color:#333;
padding-bottom:90px;
}

.header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
border-radius:18px;
padding:20px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.card h2{
color:#1565C0;
margin-bottom:15px;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:10px;
}

.box{
background:#1565C0;
color:#fff;
padding:20px;
border-radius:15px;
text-align:center;
}

.box h1{
font-size:32px;
margin-bottom:8px;
}

.box p{
font-size:15px;
}

.table-box{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#1565C0;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.present{
color:#2E7D32;
font-weight:bold;
}

.absent{
color:#D32F2F;
font-weight:bold;
}
 .box span{
font-size:15px;
}

.back-btn{
width:100%;
padding:15px;
margin-top:15px;
background:#2E7D32;
color:#fff;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.back-btn:hover{
background:#1B5E20;
}

@media(max-width:768px){

.container{
padding:12px;
}

.summary{
grid-template-columns:repeat(2,1fr);
}

.box h1{
font-size:24px;
}

.card{
padding:15px;
}

table{
font-size:14px;
}

th,td{
padding:10px;
}

}

</style>

</head>

<body>

<div class="header">

📅 Child Attendance

</div>

<div class="container">

<div class="card">

<h2>Attendance Summary</h2>

<div class="summary">

<div class="box">

<h1 id="presentCount">0</h1>

<span>Present</span>

</div>

<div class="box">

<h1 id="absentCount">0</h1>

<span>Absent</span>

</div>

<div class="box">

<h1 id="attendancePercent">0%</h1>

<span>Attendance</span>

</div>

<div class="box">

<h1 id="workingDays">0</h1>

<span>Working Days</span>

</div>

</div>

</div>

<div class="card">

<h2>Attendance History</h2>

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

<tr>

<td colspan="2">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>
<!-- Back Button -->

<button class="back-btn"
onclick="location.href='parent_dashboard.html'">

🏠 Back to Dashboard

</button>

</div>

<script type="module"
src="js/parent_attendance.js">

</script>

</body>

</html>
