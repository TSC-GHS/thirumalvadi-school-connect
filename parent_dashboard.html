<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:18px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h3{
margin-top:0;
color:#1565C0;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#1565C0;
color:white;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.home{
background:#2E7D32;
}

.home:hover{
background:#1B5E20;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1565C0;
color:white;
}

.loading{
text-align:center;
font-weight:bold;
color:#1565C0;
}

</style>

</head>

<body>

<div class="header">

👨‍👩‍👧 Parent Dashboard

</div>

<div class="container">

<div class="card">

<input
type="text"
id="emis"
placeholder="Enter Student EMIS Number">

<button onclick="loadStudent()">

🔍 Search Student

</button>

</div>

<div class="card">

<h3>👤 Student Details</h3>

<p><b>Name :</b> <span id="name">-</span></p>

<p><b>EMIS :</b> <span id="emisNo">-</span></p>

<p><b>Class :</b> <span id="class">-</span></p>

<p><b>Section :</b> <span id="section">-</span></p>

<p><b>Father :</b> <span id="father">-</span></p>

<p><b>Mother :</b> <span id="mother">-</span></p>

<p><b>Mobile :</b> <span id="mobile">-</span></p>

<p><b>Attendance :</b> <span id="attendance">-</span></p>

</div>

<div class="card">

<h3>📚 Marks</h3>

<table>

<thead>

<tr>

<th>Exam</th>

<th>Marks</th>

</tr>

</thead>

<tbody id="marksTable">

<tr>

<td colspan="2">No Marks Available</td>

</tr>

</tbody>

</table>

</div>

<div class="card">

<h3>📝 Homework</h3>

<table>

<thead>

<tr>

<th>Date</th>

<th>Subject</th>

<th>Homework</th>

</tr>

</thead>

<tbody id="homeworkTable">

<tr>

<td colspan="3">No Homework Available</td>

</tr>

</tbody>

</table>

</div>

<button
class="home"
onclick="location.href='dashboard.html'">

🏠 Back

</button>
<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.loadStudent = async function(){

const emis = document.getElementById("emis").value.trim();

if(emis==""){

alert("Please Enter EMIS Number");

return;

}

try{

const studentRef = doc(db,"students",emis);

const studentSnap = await getDoc(studentRef);

if(!studentSnap.exists()){

alert("Student Not Found");

return;

}

const student = studentSnap.data();

document.getElementById("name").innerHTML = student.name || "-";

document.getElementById("emisNo").innerHTML = student.emis || emis;

document.getElementById("class").innerHTML = student.class || "-";

document.getElementById("section").innerHTML = student.section || "-";

document.getElementById("father").innerHTML = student.father || "-";

document.getElementById("mother").innerHTML = student.mother || "-";

document.getElementById("mobile").innerHTML = student.mobile || "-";

document.getElementById("attendance").innerHTML = student.attendance || "0%";

const marksTable = document.getElementById("marksTable");

marksTable.innerHTML = "";

let marksFound = false;
   const marksSnap = await getDocs(
collection(db,"marks","Unit Test 1","students")
);

marksSnap.forEach((d)=>{

const mark = d.data();

if(mark.emis===emis){

marksFound=true;

marksTable.innerHTML+=`

<tr>

<td>${mark.exam || "Unit Test 1"}</td>

<td>${mark.marks || "-"}</td>

</tr>

`;

}

});

if(!marksFound){

marksTable.innerHTML=`

<tr>

<td colspan="2">No Marks Available</td>

</tr>

`;

}

const homeworkTable=document.getElementById("homeworkTable");

homeworkTable.innerHTML="";

let homeworkFound=false;

const homeworkSnap=await getDocs(collection(db,"homework"));

homeworkSnap.forEach((d)=>{

const hw=d.data();

if(hw.class===student.class){

homeworkFound=true;

homeworkTable.innerHTML+=`

<tr>

<td>${hw.date || "-"}</td>

<td>${hw.subject || "-"}</td>

<td>${hw.homework || "-"}</td>

</tr>

`;

}

});

if(!homeworkFound){

homeworkTable.innerHTML=`

<tr>

<td colspan="3">No Homework Available</td>

</tr>

`;

}

}catch(error){

console.error(error);

alert(error.message);

}

}

</script>

</div>

</body>

</html>
