<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Child Attendance | School Connect TN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3f9;
color:#333;
padding-bottom:90px;
}

.header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
border-radius:15px;
padding:20px;
margin-bottom:18px;
box-shadow:0 3px 12px rgba(0,0,0,.12);
}

.title{
font-size:22px;
font-weight:bold;
color:#1565C0;
margin-bottom:15px;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:15px;
}

.box{
background:#1565C0;
color:white;
border-radius:12px;
padding:20px;
text-align:center;
}

.box h1{
font-size:38px;
margin-bottom:10px;
}

.box p{
font-size:16px;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.table th{
background:#1565C0;
color:white;
padding:12px;
font-size:15px;
}

.table td{
padding:12px;
border-bottom:1px solid #ddd;
font-size:15px;
}

.present{
color:#2E7D32;
font-weight:bold;
}

.absent{
color:#D32F2F;
font-weight:bold;
}

.backBtn{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#1565C0;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
left:0;
right:0;
bottom:0;
background:#1565C0;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:13px;
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.bottom-nav span{
font-size:22px;
margin-bottom:4px;
}

@media(max-width:768px){

.header{
font-size:20px;
}

.title{
font-size:20px;
}

.box h1{
font-size:30px;
}

.table th,
.table td{
font-size:14px;
padding:10px;
}

}

</style>

</head>

<body>

<div class="header">

📅 Child Attendance

</div>

<div class="container">
<!-- Attendance Summary -->

<div class="card">

<div class="title">

📊 Attendance Summary

</div>

<div class="summary">

<div class="box">

<h1 id="attendancePercent">0%</h1>

<p>Attendance</p>

</div>

<div class="box">

<h1 id="presentDays">0</h1>

<p>Present Days</p>

</div>

<div class="box">

<h1 id="absentDays">0</h1>

<p>Absent Days</p>

</div>

</div>

</div>

<!-- Attendance History -->

<div class="card">

<div class="title">

📅 Attendance History

</div>

<table class="table">

<thead>

<tr>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

<tr>

<td colspan="2" style="text-align:center;">

Loading Attendance...

</td>

</tr>

</tbody>

</table>

<button class="backBtn"
onclick="location.href='parent_dashboard.html'">

🏠 Back to Dashboard

</button>

</div>
<!-- Bottom Navigation -->

<div class="bottom-nav">

<button onclick="location.href='parent_dashboard.html'">
<span>🏠</span>
Home
</button>

<button onclick="location.href='parent_attendance.html'">
<span>📅</span>
Attendance
</button>

<button onclick="location.href='parent_report_card.html'">
<span>📊</span>
Report
</button>

<button onclick="location.href='student_profile.html'">
<span>👤</span>
Profile
</button>

</div>

</div>

<script type="module" src="js/parent_attendance.js"></script>

</body>

</html>
