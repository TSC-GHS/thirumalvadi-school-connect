<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:18px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h3{
margin-top:0;
color:#1565C0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#1565C0;
color:white;
}

.logout{

width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#d32f2f;
color:white;
font-size:17px;
cursor:pointer;

}

.home{

width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2E7D32;
color:white;
font-size:17px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="header">

👨‍👩‍👧 Parent Dashboard

</div>

<div class="container">

<div class="card">

<h3>👤 Student Details</h3>

<p><b>Name :</b> <span id="name">Loading...</span></p>

<p><b>EMIS :</b> <span id="emisNo">Loading...</span></p>

<p><b>Class :</b> <span id="class">Loading...</span></p>

<p><b>Section :</b> <span id="section">Loading...</span></p>

<p><b>Father :</b> <span id="father">Loading...</span></p>

<p><b>Mother :</b> <span id="mother">Loading...</span></p>

<p><b>Mobile :</b> <span id="mobile">Loading...</span></p>

<p><b>Attendance :</b> <span id="attendance">Loading...</span></p>

</div>

<div class="card">

<h3>📚 Marks</h3>

<table>

<thead>

<tr>

<th>Exam</th>

<th>Marks</th>

</tr>

</thead>

<tbody id="marksTable">

<tr>

<td colspan="2">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<div class="card">

<h3>📝 Homework</h3>

<table>

<thead>

<tr>

<th>Date</th>

<th>Subject</th>

<th>Homework</th>

</tr>

</thead>

<tbody id="homeworkTable">

<tr>

<td colspan="3">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<button
class="logout"
onclick="logoutParent()">

🚪 Logout

</button>

<button
class="home"
onclick="location.href='index.html'">

🏠 Home

</button>
<script type="module">

import { auth, db } from "./firebase.js";

import {
signOut
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

import {
doc,
getDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.logoutParent = async function(){

await signOut(auth);

localStorage.removeItem("parentEMIS");

window.location.href="login.html";

}

const emis = localStorage.getItem("parentEMIS");

if(!emis){

alert("Please Login Again");

window.location.href="login.html";

}

async function loadStudent(){

try{

const studentRef = doc(db,"students",emis);

const studentSnap = await getDoc(studentRef);

if(!studentSnap.exists()){

alert("Student Not Found");

return;

}

const student = studentSnap.data();

document.getElementById("name").innerHTML = student.name || "-";

document.getElementById("emisNo").innerHTML = student.emis || emis;

document.getElementById("class").innerHTML = student.class || "-";

document.getElementById("section").innerHTML = student.section || "-";

document.getElementById("father").innerHTML = student.father || "-";

document.getElementById("mother").innerHTML = student.mother || "-";

document.getElementById("mobile").innerHTML = student.mobile || "-";

document.getElementById("attendance").innerHTML = student.attendance || "0%";

const marksTable = document.getElementById("marksTable");

marksTable.innerHTML="";

let marksFound=false;
   const marksSnap = await getDocs(
collection(db,"marks","Unit Test 1","students")
);

marksSnap.forEach((d)=>{

const mark=d.data();

if(mark.emis===emis){

marksFound=true;

marksTable.innerHTML+=`

<tr>

<td>${mark.exam || "Unit Test 1"}</td>

<td>${mark.marks || "-"}</td>

</tr>

`;

}

});

if(!marksFound){

marksTable.innerHTML=`

<tr>

<td colspan="2">No Marks Available</td>

</tr>

`;

}

const homeworkTable=document.getElementById("homeworkTable");

homeworkTable.innerHTML="";

let homeworkFound=false;

const homeworkSnap=await getDocs(collection(db,"homework"));

homeworkSnap.forEach((d)=>{

const hw=d.data();

if(hw.class===student.class){

homeworkFound=true;

homeworkTable.innerHTML+=`

<tr>

<td>${hw.date || "-"}</td>

<td>${hw.subject || "-"}</td>

<td>${hw.homework || "-"}</td>

</tr>

`;

}

});

if(!homeworkFound){

homeworkTable.innerHTML=`

<tr>

<td colspan="3">No Homework Available</td>

</tr>

`;

}

}catch(error){

console.error(error);

alert(error.message);

}

}

loadStudent();

</script>

</div>

</body>

</html>
