<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Management V3</title>

<link rel="stylesheet" href="css/leave.css">

</head>

<body>

<div class="header">

<h2>📝 Leave Management</h2>

<p>School Connect TN</p>

</div>

<div class="container">

<div class="summaryCards">

<div class="summaryCard pending">

<h3 id="pendingCount">0</h3>

<p>Pending</p>

</div>

<div class="summaryCard approved">

<h3 id="approvedCount">0</h3>

<p>Approved</p>

</div>

<div class="summaryCard rejected">

<h3 id="rejectedCount">0</h3>

<p>Rejected</p>

</div>

</div>

<div class="card">

<input
type="text"
id="searchStudent"
placeholder="🔍 Search Student">

<div class="filters">

<select id="statusFilter">

<option value="All">All Status</option>

<option value="Pending">Pending</option>

<option value="Approved">Approved</option>

<option value="Rejected">Rejected</option>

</select>

<select id="classFilter">

<option value="All">All Classes</option>

<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<select id="sectionFilter">

<option value="All">All Sections</option>

<option>A</option>
<option>B</option>
<option>C</option>

</select>

</div>

<label>

<input
type="checkbox"
id="selectAll">

Select All

</label>

<div class="bulkButtons">

<button id="approveSelected">

✅ Approve Selected

</button>

<button id="rejectSelected">

❌ Reject Selected

</button>

</div>

</div>

<div id="leaveList">
  </div>

<div class="bottomButtons">

<button
class="backBtn"
onclick="location.href='teacher.html'">

🏠 Teacher Dashboard

</button>

<button
class="backBtn"
onclick="location.href='headmaster.html'">

🏫 Headmaster Dashboard

</button>

</div>

</div>

<script type="module" src="js/leave_management.js"></script>

</body>

</html>
