<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bulk Upload</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:700px;
margin:20px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
margin-bottom:20px;
}

h3{
color:#1565C0;
margin-top:0;
}

select,
input[type=file]{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
background:#1565C0;
color:white;
}

button:hover{
background:#0D47A1;
}

.downloadBtn{
background:#2E7D32;
}

.downloadBtn:hover{
background:#1B5E20;
}

.home{
background:#455A64;
}

.home:hover{
background:#263238;
}

.status{
margin-top:15px;
font-weight:bold;
text-align:center;
color:#1565C0;
}

.note{
margin-top:15px;
padding:12px;
background:#FFF8E1;
border-left:5px solid orange;
border-radius:6px;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">

📥 School Connect TN - Bulk Upload

</div>

<div class="container">

<div class="card">

<h3>Select Upload Type</h3>

<select id="uploadType">

<option value="students">👨‍🎓 Students</option>
<option value="teachers">👨‍🏫 Teachers</option>
<option value="attendance">📅 Attendance</option>
<option value="marks">📝 Marks</option>

</select>

<button
class="downloadBtn"
id="downloadTemplateBtn">

⬇ Download CSV Template

</button>

<input
type="file"
id="csvFile"
accept=".csv">

<button
id="uploadBtn">

📤 Upload CSV

</button>

<p
class="status"
id="status">

Waiting for upload...

</p>

<div class="note">

<b>CSV Format</b><br><br>

Students :
EMIS,Name,Class,Section,Father,Mother,Mobile

<br><br>

Teachers :
ID,Name,Subject,Email,Mobile

<br><br>

Attendance :
EMIS,Date,Status

<br><br>

Marks :
EMIS,Exam,Tamil,English,Maths,Science,Social

</div>

</div>

<button
class="home"
onclick="location.href='dashboard.html'">

🏠 Back to Dashboard

</button>

</div>

<script type="module" src="bulk_upload.js"></script>

</body>

</html>
