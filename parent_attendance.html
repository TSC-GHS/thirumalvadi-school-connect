<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Child Attendance | School Connect TN</title>

<link rel="stylesheet" href="css/parent_attendance.css">

</head>

<body>

<div class="header">

📅 Child Attendance

</div>

<div class="container">

<!-- Attendance Summary -->

<div class="card">

<h2>Attendance Summary</h2>

<div class="summary">

<div class="summary-box">

<h1 id="presentCount">0</h1>

<p>Present</p>

</div>

<div class="summary-box">

<h1 id="absentCount">0</h1>

<p>Absent</p>

</div>

<div class="summary-box">

<h1 id="attendancePercent">0%</h1>

<p>Attendance</p>

</div>

</div>

</div>

<!-- Attendance History -->

<div class="card">

<h2>Attendance History</h2>

<div class="table-responsive">

<table>

<thead>

<tr>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

<tr>

<td colspan="2">

Loading...

</td>

</tr>
</tbody>

</table>

</div>

</div>

<button class="back-btn"
onclick="location.href='parent_dashboard.html'">

🏠 Back to Dashboard

</button>

</div>

<div class="bottom-nav">

<span>🏠</span>
Home
</button>

<span>📅</span>
Attendance
</button>

<button onclick="location.href='parent_report_card.html'">
<span>📊</span>
Report
</button>

<button onclick="location.href='student_profile_v2.html'">
<span>👤</span>
Profile
</button>

</div>

<script type="module" src="js/parent_attendance.js"></script>

</body>

</html>
