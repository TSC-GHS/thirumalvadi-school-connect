<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile | School Connect TN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
border-radius:12px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#0d47a1;
margin-bottom:20px;
}

.photo{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.photo img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #0d47a1;
object-fit:cover;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

td:first-child{
font-weight:bold;
width:40%;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#0d47a1;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Profile</h2>

<div class="photo">
<img id="studentPhoto" src="images/student.png">
</div>

<table>

<tr>
<td>Name</td>
<td id="studentName">-</td>
</tr>

<tr>
<td>Class</td>
<td id="studentClass">-</td>
</tr>

<tr>
<td>Admission No</td>
<td id="admissionNo">-</td>
</tr>

<tr>
<td>EMIS</td>
<td id="emis">-</td>
</tr>

<tr>
<td>Date of Birth</td>
<td id="dob">-</td>
</tr>

<tr>
<td>Blood Group</td>
<td id="blood">-</td>
</tr>
<tr>
<td>Father Name</td>
<td id="father">-</td>
</tr>

<tr>
<td>Mother Name</td>
<td id="mother">-</td>
</tr>

<tr>
<td>Mobile</td>
<td id="mobile">-</td>
</tr>

<tr>
<td>Medium</td>
<td id="medium">-</td>
</tr>

<tr>
<td>Academic Year</td>
<td id="academicYear">-</td>
</tr>

<tr>
<td>Address</td>
<td id="address">-</td>
</tr>

<tr>
<td>Attendance</td>
<td id="attendancePercent">0%</td>
</tr>

<tr>
<td>Average Mark</td>
<td id="averageMark">0%</td>
</tr>

<tr>
<td>Rank</td>
<td id="studentRank">-</td>
</tr>

<tr>
<td>Result</td>
<td id="studentResult">-</td>
</tr>

</table>

<div class="buttons">

<button onclick="downloadIDCard()">
Download ID Card
</button>

<button onclick="editStudent()">
Edit Student
</button>

</div>

</div>
<script type="module">

import { db } from "./firebase.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

//========================================
// Get Student EMIS
//========================================

const params = new URLSearchParams(window.location.search);

const emis =
  params.get("emis") ||
  localStorage.getItem("emis") ||
  sessionStorage.getItem("emis");

if (!emis) {

  alert("Student EMIS not found");
  location.href = "parent_dashboard.html";
  throw new Error("Student EMIS not found");

}

async function loadStudent() {

  try {

    const snap = await getDoc(doc(db, "students", emis));

    if (!snap.exists()) {
      alert("Student not found");
      return;
    }

    const s = snap.data();

    document.getElementById("studentName").textContent = s.name || "-";
    document.getElementById("studentClass").textContent =
      `${s.class || "-"} - ${s.section || "-"}`;
    document.getElementById("admissionNo").textContent =
      s.admissionNo || "-";
    document.getElementById("emis").textContent =
      s.emis || emis;
    document.getElementById("dob").textContent =
      s.dob || "-";
    document.getElementById("blood").textContent =
      s.blood || "-";
    document.getElementById("father").textContent =
      s.father || "-";
    document.getElementById("mother").textContent =
      s.mother || "-";
    document.getElementById("mobile").textContent =
      s.mobile || "-";
    document.getElementById("medium").textContent =
      s.medium || "-";
    document.getElementById("academicYear").textContent =
      s.academicYear || "-";
    document.getElementById("address").textContent =
      s.address || "-";
    document.getElementById("attendancePercent").textContent =
      s.attendance || "0%";
    document.getElementById("averageMark").textContent =
      s.average || "0%";
    document.getElementById("studentRank").textContent =
      s.rank || "-";
    document.getElementById("studentResult").textContent =
      s.result || "-";

    if (s.photo) {
      document.getElementById("studentPhoto").src = s.photo;
    }

  } catch (error) {

    console.error(error);
    alert(error.message);

  }

}
  window.downloadIDCard = function () {
  alert("🪪 Student ID Card download will be available soon.");
};

window.editStudent = function () {
  location.href = "student_management.html?emis=" + emis;
};

// Load student details
loadStudent();

</script>

</body>
</html>
