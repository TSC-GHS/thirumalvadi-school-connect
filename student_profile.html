<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Student Profile</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5fa;
padding-bottom:90px;
}

.header{

background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;

}

.container{

max-width:900px;
margin:auto;
padding:15px;

}

.card{

background:white;
border-radius:15px;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,.15);

}

.profile{

text-align:center;

}

.profile img{

width:120px;
height:120px;
border-radius:50%;
border:4px solid #1565C0;
object-fit:cover;
margin-bottom:15px;

}

.profile h2{

color:#1565C0;
margin-bottom:5px;

}

.profile p{

color:#555;

}

.details{

margin-top:20px;

}

.row{

display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;

}

.row:last-child{

border:none;

}

.title{

font-weight:bold;
color:#1565C0;

}

.value{

color:#444;

}

.action{

margin-top:25px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;

}

.action button{

padding:15px;
border:none;
border-radius:10px;
background:#1565C0;
color:white;
font-size:16px;
cursor:pointer;

}

.action button:hover{

background:#0D47A1;

}

</style>

</head>

<body>

<div class="header">

👦 Student Profile

</div>

<div class="container">

<div class="card">

<div class="profile">

<img
id="photo"
src="assets/student.png">

<h2 id="studentName">

Loading...

</h2>

<p id="studentClass">

Loading...

</p>

</div>

<div class="details">

<div class="row">

<div class="title">

EMIS Number

</div>

<div
class="value"
id="emis">

Loading...

</div>

</div>

<div class="row">

<div class="title">

Father

</div>

<div
class="value"
id="father">

Loading...

</div>

</div>

<div class="row">

<div class="title">

Mother

</div>

<div
class="value"
id="mother">

Loading...

</div>

</div>
<div class="row">

<div class="title">

Mobile

</div>

<div
class="value"
id="mobile">

Loading...

</div>

</div>

<div class="row">

<div class="title">

Blood Group

</div>

<div
class="value"
id="blood">

Loading...

</div>

</div>

<div class="row">

<div class="title">

Date of Birth

</div>

<div
class="value"
id="dob">

Loading...

</div>

</div>

<div class="row">

<div class="title">

Address

</div>

<div
class="value"
id="address">

Loading...

</div>

</div>

</div>

<div class="action">

<button
onclick="location.href='parent_dashboard.html'">

🏠 Dashboard

</button>

<button
onclick="location.href='parent_attendance.html'">

📅 Attendance

</button>

<button
onclick="location.href='parent_report_card.html'">

📊 Report Card

</button>

<button
onclick="location.href='leave_request.html'">

📝 Apply Leave

</button>

<button
onclick="location.href='leave_status.html'">

📋 Leave Status

</button>

<button
onclick="logoutParent()">

🚪 Logout

</button>

</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
signOut
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const emis =
localStorage.getItem("parentEMIS");

if(!emis){

location.href="parent_login.html";

}

const snap =
await getDoc(doc(db,"students",emis));

if(snap.exists()){

const s=snap.data();

document.getElementById("studentName").innerHTML=s.name||"-";

document.getElementById("studentClass").innerHTML=
(s.class||"-")+" - "+(s.section||"-");

document.getElementById("emis").innerHTML=s.emis||emis;

document.getElementById("father").innerHTML=s.father||"-";

document.getElementById("mother").innerHTML=s.mother||"-";

document.getElementById("mobile").innerHTML=s.mobile||"-";

document.getElementById("blood").innerHTML=s.blood||"-";

document.getElementById("dob").innerHTML=s.dob||"-";

document.getElementById("address").innerHTML=s.address||"-";

if(s.photo){

document.getElementById("photo").src=s.photo;

}

}
  window.logoutParent = async function(){

try{

await signOut(auth);

localStorage.removeItem("parentEMIS");

location.href="parent_login.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>

</html>
