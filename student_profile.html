<script type="module">

import { db } from "./firebase.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

//========================================
// Get Student EMIS
//========================================

const params = new URLSearchParams(window.location.search);

const emis =
  params.get("emis") ||
  localStorage.getItem("emis") ||
  sessionStorage.getItem("emis");

if (!emis) {

  alert("Student EMIS not found");

  location.href = "parent_dashboard.html";

  throw new Error("Student EMIS not found");

}

//========================================
// Load Student
//========================================

async function loadStudent() {

  try {

    const snap = await getDoc(doc(db, "students", emis));

    if (!snap.exists()) {

      alert("Student not found");

      return;

    }

    const s = snap.data();

    document.getElementById("studentName").innerHTML = s.name || "-";

    document.getElementById("studentClass").innerHTML =
      `${s.class || "-"} - ${s.section || "-"}`;

    document.getElementById("admissionNo").innerHTML =
      s.admissionNo || "-";

    document.getElementById("emis").innerHTML =
      s.emis || emis;

    document.getElementById("dob").innerHTML =
      s.dob || "-";

    document.getElementById("blood").innerHTML =
      s.blood || "-";
        document.getElementById("father").innerHTML =
      s.father || "-";

    document.getElementById("mother").innerHTML =
      s.mother || "-";

    document.getElementById("mobile").innerHTML =
      s.mobile || "-";

    document.getElementById("medium").innerHTML =
      s.medium || "-";

    document.getElementById("academicYear").innerHTML =
      s.academicYear || "-";

    document.getElementById("address").innerHTML =
      s.address || "-";

    if (s.photo) {
      document.getElementById("studentPhoto").src = s.photo;
    }

    document.getElementById("attendancePercent").innerHTML =
      s.attendance || "0%";

    document.getElementById("averageMark").innerHTML =
      s.average || "0%";

    document.getElementById("studentRank").innerHTML =
      s.rank || "-";

    document.getElementById("studentResult").innerHTML =
      s.result || "-";

  } catch (error) {

    console.error(error);

    alert(error.message);

  }

}
  //========================================
// Buttons
//========================================

window.downloadIDCard = function () {

  alert("🪪 Student ID Card download will be added in the next version.");

};

window.editStudent = function () {

  location.href = "student_management.html?emis=" + emis;

};

//========================================
// Load Student
//========================================

loadStudent();

</script>
