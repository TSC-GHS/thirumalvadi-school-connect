<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

textarea{
height:120px;
resize:vertical;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
background:#1565C0;
color:white;
}

.home{
background:#2E7D32;
}
</style>

</head>

<body>

<div class="header">
📝 Homework Management
</div>

<div class="container">

<label>Class</label>
<select id="class">
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>Subject</label>
<input type="text" id="subject" placeholder="Enter Subject">

<label>Homework</label>
<textarea id="homework" placeholder="Enter Homework"></textarea>

<button onclick="saveHomework()">
💾 Save Homework
</button>

<button class="home"
onclick="location.href='headmaster.html'">
🏠 Back
</button>

</div>

<script type="module">
import { db } from "./firebase.js";

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.saveHomework = async function(){

const className = document.getElementById("class").value;
const subject = document.getElementById("subject").value;
const homework = document.getElementById("homework").value;

if(subject.trim()==="" || homework.trim()===""){
alert("Please enter Subject and Homework");
return;
}

await setDoc(doc(db,"homework",className),{

class: className,
subject: subject,
homework: homework,
date: new Date().toISOString().split("T")[0]

});

alert("Homework Saved Successfully ✅");

document.getElementById("subject").value="";
document.getElementById("homework").value="";

}
  </script>

</body>
</html>
