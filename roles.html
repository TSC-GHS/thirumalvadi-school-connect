<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Connect TN - Login</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
width:90%;
max-width:400px;
}

h2{
text-align:center;
color:#1565C0;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>School Connect TN</h2>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<select id="role">

<option value="">Select Role</option>

<option value="headmaster">Headmaster</option>

<option value="teacher">Teacher</option>

<option value="parent">Parent</option>

</select>
<button onclick="login()">

🔐 Login

</button>

<p style="text-align:center;margin-top:15px;">

<a href="#" onclick="forgotPassword()">
Forgot Password?
</a>

</p>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
