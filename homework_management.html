<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Homework Management</title>

<link rel="stylesheet" href="css/homework.css">

</head>

<body>

<div class="header">

<h2>📚 Homework Management</h2>

<p>School Connect TN</p>

</div>

<div class="container">

<div class="card">

<h3>Add Homework</h3>

<input
type="text"
id="homeworkTitle"
placeholder="Homework Title">

<textarea
id="homeworkDescription"
placeholder="Homework Description">
</textarea>

<select id="className">

<option value="">Select Class</option>

<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<select id="section">

<option value="">Section</option>

<option>A</option>
<option>B</option>
<option>C</option>

</select>

<select id="subject">

<option value="">Subject</option>

<option>Tamil</option>
<option>English</option>
<option>Maths</option>
<option>Science</option>
<option>Social</option>

</select>

<label>Due Date</label>

<input
type="date"
id="dueDate">

<button id="saveHomework">

💾 Save Homework

</button>

</div>

<br>

<div class="card">

<h3>Homework List</h3>

<div id="homeworkList">

Loading...

</div>

</div>
<div class="card">

<h3>Recent Homework</h3>

<div id="homeworkList">

Loading Homework...

</div>

</div>

<div class="bottomButtons">

<button onclick="location.href='teacher.html'">

🏠 Back to Teacher Dashboard

</button>

</div>

</div>

<script type="module" src="js/homework_management.js"></script>

</body>

</html>
