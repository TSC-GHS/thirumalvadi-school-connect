<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#6A1B9A;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

textarea{
height:80px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:8px;
background:#6A1B9A;
color:white;
font-size:17px;
cursor:pointer;
}

.home{
background:#2E7D32;
}

</style>

</head>

<body>

<div class="header">

👨‍🎓 Student Management

</div>

<div class="container">

<div class="card">

<label>Student Name</label>
<input id="name">

<label>EMIS Number</label>
<input id="emis">

<label>Class</label>
<input id="class">

<label>Section</label>
<input id="section">
  <label>Medium</label>

<select id="medium">

<option value="">Select Medium</option>

<option value="Tamil">Tamil Medium</option>

<option value="English">English Medium</option>

</select>

<label>Academic Year</label>

<select id="academicYear">

<option value="">Select Academic Year</option>

<option value="2026-2027">2026-2027</option>

<option value="2027-2028">2027-2028</option>

<option value="2028-2029">2028-2029</option>

</select>

<label>Father Name</label>
<input id="father">

<label>Mother Name</label>
<input id="mother">

<label>Parent Mobile</label>
<input id="mobile">

<label>Blood Group</label>
<input id="blood">

<label>Address</label>
<textarea id="address"></textarea>

<button onclick="saveStudent()">

💾 Save / Update Student

</button>

<button class="home"
onclick="location.href='students.html'">

👨‍🎓 Students List

</button>

<button class="home"
onclick="location.href='dashboard.html'">

🏠 Home

</button>

</div>

<script type="module">
import { db } from "./firebase.js";

import {
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

window.saveStudent = async function(){

const name = document.getElementById("name").value.trim();
const emis = document.getElementById("emis").value.trim();
const studentClass = document.getElementById("class").value.trim();
const section = document.getElementById("section").value.trim();
  const medium =
document.getElementById("medium").value;

const academicYear =
document.getElementById("academicYear").value;
const father = document.getElementById("father").value.trim();
const mother = document.getElementById("mother").value.trim();
const mobile = document.getElementById("mobile").value.trim();
const blood = document.getElementById("blood").value.trim();
const address = document.getElementById("address").value.trim();

if(
name=="" ||
emis=="" ||
studentClass=="" ||
section=="" ||
medium=="" ||
academicYear==""
){

alert("Please fill all required fields");

return;

}

alert("Please fill all required fields");

return;

}

try{

await setDoc(doc(db,"students",emis),{

name:name,
emis:emis,
class:studentClass,
section:section,
medium: medium,

academicYear: academicYear,  
father:father,
mother:mother,
mobile:mobile,
blood:blood,
address:address,
attendance:"0%",
createdAt:new Date().toISOString()

});

alert("✅ Student Saved Successfully");

document.getElementById("name").value="";
document.getElementById("emis").value="";
document.getElementById("class").value="";
document.getElementById("section").value="";
document.getElementById("father").value="";
document.getElementById("mother").value="";
document.getElementById("mobile").value="";
document.getElementById("blood").value="";
document.getElementById("address").value="";

}catch(error){

alert(error.message);

}

}
  </script>

</body>
</html>
