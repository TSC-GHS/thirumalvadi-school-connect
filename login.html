<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Connect TN</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#fff;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

#msg{
color:red;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>School Connect TN</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p id="msg"></p>

</div>

</body>
</html>
