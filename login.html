<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

School Connect TN

</title>

<link rel="stylesheet"
href="css/login.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo-section">

<img
src="assets/icon-192.png"
class="school-logo"
alt="School Logo">

<h1>

School Connect TN

</h1>

<p class="subtitle">

Government School Management System

</p>

</div>

<div class="form-group">

<label>

School

</label>

<select id="school">

<option>

திருமல்வாடி அரசு உயர்நிலைப்பள்ளி

</option>

</select>

</div>

<div class="form-group">

<label>

Role

</label>

<select id="role">

<option value="Parent">
👨‍👩‍👧 Parent
</option>

<option value="Student">
👨‍🎓 Student
</option>

<option value="Teacher">
👨‍🏫 Teacher
</option>

<option value="Headmaster">
👨‍💼 Headmaster
</option>

<option value="Admin">
⚙️ Admin
</option>

</select>

</div>

<div class="form-group">

<label>

Username / EMIS

</label>

<input
type="text"
id="email"
placeholder="Enter Username / EMIS">

</div>

<div class="form-group">

<label>

Password

</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter Password">

<button
type="button"
id="togglePassword">

👁️

</button>

</div>

</div>

<div class="remember">

<input
type="checkbox"
id="remember">

<label for="remember">

Remember Me

</label>

</div>

<button
class="login-btn"
onclick="loginUser()">

Login

</button>

<p id="msg"></p>
<div class="footer-section">

<p class="version">

Version 1.0

</p>

<p class="powered">

Powered by

<b>VTOOS Software Solution</b>

</p>

</div>

</div>

</div>

<script type="module" src="login.js"></script>

<script>

const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");

togglePassword.addEventListener("click",()=>{

if(password.type==="password"){

password.type="text";

togglePassword.innerHTML="🙈";

}else{

password.type="password";

togglePassword.innerHTML="👁️";

}

});

</script>

</body>

</html>
