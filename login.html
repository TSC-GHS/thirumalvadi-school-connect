<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Connect TN - Login</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}

.login-box{
width:90%;
max-width:400px;
margin:80px auto;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#1565C0;
}

select,input{
width:100%;
padding:12px;
margin-top:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:6px;
background:#1565C0;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

#msg{
color:red;
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🏫 School Connect TN</h2>

<select id="role">

<option value="Student">👨‍🎓 Student</option>

<option value="Teacher">👨‍🏫 Teacher</option>

<option value="Parent">👨‍👩‍👧 Parent</option>

<option value="Headmaster">👨‍💼 Headmaster</option>

<option value="Admin">⚙️ Admin</option>

</select>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="loginUser()">

Login

</button>

<p id="msg"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
