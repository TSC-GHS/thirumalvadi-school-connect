<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Report Card</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
margin-bottom:20px;
}

h3{
margin-top:0;
color:#1565C0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#1565C0;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.download{
width:100%;
padding:15px;
margin-top:20px;
background:#2E7D32;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

.back{
width:100%;
padding:15px;
margin-top:12px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

📄 Parent Report Card

</div>

<div class="container">

<div class="card">

<h3>Student Report Card</h3>

<div id="studentInfo">

Loading Student Details...

</div>

<table>

<thead>

<tr>

<th>Subject</th>

<th>Marks</th>

<th>Grade</th>

</tr>

</thead>

<tbody id="reportBody">

</tbody>

</table>

<button class="download"
onclick="window.print()">

📥 Download / Print PDF

</button>

<button class="back"
onclick="location.href='parent.html'">

🏠 Back to Parent Dashboard

</button>

</div>

</div>

<script type="module" src="js/parent_report_card.js"></script>

</body>
</html>
