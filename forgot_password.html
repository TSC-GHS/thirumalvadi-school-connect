<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#1565C0;
}

input{
width:100%;
padding:12px;
margin-top:20px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:8px;
background:#1565C0;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
color:green;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#1565C0;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>🔑 Forgot Password</h2>

<input
type="email"
id="email"
placeholder="Enter Registered Email">

<button id="resetBtn">
Send Reset Link
</button>

<p id="msg"></p>

<a href="login.html">⬅ Back to Login</a>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

const btn=document.getElementById("resetBtn");

btn.addEventListener("click",async()=>{

const email=document.getElementById("email").value.trim();

if(email===""){
alert("Please enter your registered email");
return;
}

try{

await sendPasswordResetEmail(auth,email);

document.getElementById("msg").innerHTML=
"✅ Password reset email sent successfully. Please check your inbox.";

}catch(error){

console.log(error);

alert(error.code+" : "+error.message);

}

});

</script>

</body>
</html>
