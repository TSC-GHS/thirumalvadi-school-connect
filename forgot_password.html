<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

width:90%;
max-width:400px;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}

h2{

text-align:center;

color:#1565C0;

}

input{

width:100%;

padding:12px;

margin-top:20px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

box-sizing:border-box;

}

button{

width:100%;

padding:12px;

margin-top:20px;

border:none;

border-radius:8px;

background:#1565C0;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#0D47A1;

}

#msg{

margin-top:15px;

text-align:center;

color:green;

}

</style>

</head>

<body>

<div class="box">

<h2>🔑 Forgot Password</h2>

<input
type="email"
id="email"
placeholder="Enter Registered Email">

<button onclick="resetPassword()">

Send Reset Link

</button>

<p id="msg"></p>
