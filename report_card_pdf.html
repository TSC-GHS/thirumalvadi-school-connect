<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Report Card</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

📄 PDF Report Card

</div>

<div class="container">

<div class="card">

<input
type="text"
id="emis"
placeholder="Enter Student EMIS Number">

<button onclick="loadReport()">

🔍 Load Report

</button>

<div id="reportArea">

</div>
<button onclick="downloadPDF()">

📥 Download PDF

</button>

<button onclick="window.print()">

🖨️ Print Report

</button>

<button onclick="location.href='teacher.html'">

🏠 Back

</button>

</div>

</div>

<script type="module" src="js/report_card_pdf.js"></script>

</body>

</html>
